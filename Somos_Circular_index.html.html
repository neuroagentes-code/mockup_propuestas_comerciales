<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroAgentes · Tablero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* tokens EXACTOS del index.css de NeuroAgentes */
    --green:#00FF7A; --green-h:#00e06c; --green-ink:#0D3326; --green-soft:#e3fff0;
    --side:#0E1F1C; --side-2:#16302a; --side-3:#1f3a32; --side-line:rgba(255,255,255,.45);
    --bg:#F5F5F5; --card:#FFFFFF; --ink:#141922; --kanban:#58585E; --msg:#0D3326;
    --blue:#00A8FF; --reject:#FC577F; --border:#D2D2D2; --border-in:#E9E9E9; --soft:#888888; --gray4:#BDBDBD;
    /* tints por área (para distinguir agentes en avatares) */
    --comercial:#00C95F; --marketing:#e84aa0; --finanzas:#e89a0c; --operaciones:#2f8fe8; --administrativo:#8a5cf0; --soporte:#0fb6a0;
    /* tints para agentes verticales / a la medida del sector */
    --ambiental:#16a34a; --inventario:#0ea5e9; --talento:#f43f5e; --mantenimiento:#f97316; --legal:#a855f7; --logistica:#0d9488; --vertical:#00b894;
    --font:'Montserrat',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--font);background:var(--side);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden}
  .shell{display:grid;grid-template-columns:288px 1fr;grid-template-rows:64px 1fr;grid-template-areas:"logo top" "side main";height:100vh}

  /* ---------- logo + header (bg-content-green #0E1F1C) ---------- */
  .logo{grid-area:logo;background:var(--side);display:flex;align-items:center;padding:0 24px}
  .logo-img{height:50px;width:auto;display:block}
  .top{grid-area:top;background:var(--side);display:flex;align-items:center;gap:16px;padding:0 40px}
  .top .sp{flex:1}
  .tenant{display:flex;align-items:center;gap:9px;background:var(--side-2);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:6px 11px 6px 7px;cursor:pointer}
  .tenant .b{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-weight:800;color:var(--green-ink);background:var(--green);font-size:12px}
  .tenant .c{display:flex;flex-direction:column;line-height:1.05}
  .tenant .l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#8aa399}
  .tenant select{background:transparent;border:0;color:#fff;font-family:var(--font);font-weight:600;font-size:13px;outline:none;cursor:pointer;padding:0;margin-top:1px}
  .tenant select option{background:var(--side-2)}
  .admin{display:flex;align-items:center;gap:12px;color:#fff;font-size:15px;font-weight:700}
  .admin .muted{font-weight:700}
  .admin .av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#2a5a40,#16302a);border:2px solid #fff;display:grid;place-items:center;font-weight:800;color:var(--green);font-size:13px}

  /* ---------- sidebar (w-72 p-6 bg-content-green) ---------- */
  .side{grid-area:side;background:var(--side);overflow-y:auto;padding:22px 18px;display:flex;flex-direction:column;scrollbar-width:none;-ms-overflow-style:none}
  .side::-webkit-scrollbar{width:0;height:0;display:none}
  .nav{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:9px;color:#fff;font-weight:500;font-size:14px;cursor:pointer;transition:.14s}
  .nav:hover{background:var(--side-2)}
  .nav svg{width:19px;height:19px;stroke:#fff;flex:none}
  hr.sep{border:0;border-top:1px solid var(--side-line);margin:14px 4px}
  .modlabel{font-size:12px;font-weight:700;color:#fff;letter-spacing:.04em;padding:2px 12px}
  .grouphead{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:9px;color:#fff;font-weight:500;font-size:14px;cursor:pointer;transition:.14s}
  .grouphead:hover{background:var(--side-2)}
  .grouphead.allon{background:var(--side-2)}
  .grouphead svg.ic{width:19px;height:19px;stroke:#fff;flex:none}
  .grouphead .chev{margin-left:auto;width:16px;height:16px;stroke:#fff;transition:.2s}
  .grouphead .allpend{margin-left:auto;font-size:10px;font-weight:700;color:var(--green-ink);background:var(--green);border-radius:10px;padding:1px 7px;margin-right:6px}
  .agents{display:flex;flex-direction:column;gap:6px;margin:8px 0 2px}
  .agent{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:.14s;color:#fff}
  .agent:hover{background:var(--side-2)}
  .agent.active{background:var(--green)}
  .agent.active .t{color:var(--green-ink);font-weight:600}
  .agent.off{opacity:.4;cursor:default}
  .agent .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;flex:none;overflow:hidden;border:1.5px solid rgba(255,255,255,.18)}
  .agent .av svg{width:17px;height:17px}
  .agent.off .av{background:var(--side-3)!important;border-color:rgba(255,255,255,.1)}
  .agent .t{min-width:0;flex:1;font-size:13px;font-weight:300;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .agent .t small{display:block;font-size:10px;color:#8aa399}
  .agent .pend{font-size:10px;font-weight:700;color:var(--green-ink);background:var(--green);border-radius:10px;padding:1px 6px;flex:none}
  .agent.active .pend{background:var(--green-ink);color:var(--green)}
  .agent .pend.zero{background:var(--side-3);color:#8aa399}

  /* ---------- main (bg-background-dashboard #F5F5F5) ---------- */
  .main{grid-area:main;background:var(--bg);overflow:auto;padding:26px 30px 36px}
  /* agent header card (bg-white rounded-xl) */
  .agent-card{position:relative;background:var(--card);border-radius:14px;padding:16px 56px 16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .agent-card .left{display:flex;align-items:center;gap:16px;min-width:0}
  .ahdr-toggle{position:absolute;top:50%;transform:translateY(-50%);right:14px;width:30px;height:30px;border-radius:8px;border:1px solid var(--border-in);background:var(--bg);color:var(--soft);cursor:pointer;display:grid;place-items:center;transition:.14s}
  .ahdr-toggle:hover{background:#ececec;color:var(--ink)}
  .ahdr-toggle svg{width:17px;height:17px;stroke:currentColor;fill:none;transition:.2s}
  .agent-card.compact{padding:6px 56px 6px 16px}
  .agent-card.compact .left{gap:10px}
  .agent-card.compact .big{width:30px;height:30px;border:0}
  .agent-card.compact .big svg{width:17px;height:17px}
  .agent-card.compact h1{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:230px}
  .agent-card.compact .role{display:none}
  .agent-card.compact .atabs{padding:4px;gap:5px}
  .agent-card.compact .atab{padding:7px 13px;font-size:12.5px}
  .agent-card.compact .atab svg{width:15px;height:15px}
  .agent-card.compact .ahdr-toggle svg{transform:rotate(180deg)}
  .main.hdr-compact{padding-top:14px}
  .main.hdr-compact .vec-grid{height:calc(100vh - 128px)}
  .main.hdr-compact .agent-card{margin-bottom:10px}
  .agent-card .big{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;flex:none;overflow:hidden;border:1px solid var(--border-in)}
  .agent-card .big svg{width:24px;height:24px}
  .agent-card h1{font-size:18px;font-weight:700;margin:0;color:var(--ink)}
  .agent-card .role{font-size:12px;color:var(--soft);margin-top:2px;font-weight:400}
  .tabs{display:flex;gap:8px;flex-wrap:wrap}
  .tab{display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:9px;background:var(--bg);font-size:14px;font-weight:500;color:var(--msg);cursor:pointer;transition:.14s}
  .tab svg{width:16px;height:16px;stroke:var(--ink)}
  .tab.active{background:var(--side);color:#fff}.tab.active svg{stroke:var(--green)}

  /* crm card (bg-white rounded-2xl px-6 py-6 mt-5) */
  .crm-card{background:var(--card);border-radius:18px;padding:22px 24px;margin-top:20px}
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .search{display:flex;align-items:center;gap:9px;background:var(--bg);border-radius:10px;padding:11px 14px;width:50%;min-width:240px}
  .search svg{width:16px;height:16px;stroke:var(--soft)}
  .search input{flex:1;border:0;outline:none;background:transparent;font-family:var(--font);font-size:14px;color:var(--ink)}
  .search input::placeholder{color:var(--gray4)}
  .toolbar .acts{display:flex;align-items:center;gap:12px}
  .gbtn{background:var(--green);color:var(--green-ink);border:0;border-radius:9px;padding:10px 18px;font-family:var(--font);font-weight:600;font-size:14px;cursor:pointer;transition:.14s}
  .gbtn:hover{background:var(--green-h)}

  .filters{display:flex;align-items:center;gap:18px;padding:18px 0}
  .vtog{width:42px;height:40px;border-radius:9px;background:var(--bg);border:1px solid transparent;display:grid;place-items:center;cursor:pointer}
  .vtog.on{border-color:#22c55e}
  .vtog svg{width:17px;height:17px;stroke:var(--ink)}
  .sel{display:flex;align-items:center;gap:8px;width:160px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 14px;font-size:13px;color:var(--soft);cursor:pointer}
  .sel svg{width:14px;height:14px;stroke:var(--soft);margin-left:auto}

  .board{display:flex;gap:24px;overflow-x:auto;padding-top:6px;align-items:flex-start}
  .col{width:280px;flex:none;display:flex;flex-direction:column;gap:16px}
  .col-h .nm{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--kanban)}
  .col-h .ct{font-size:11px;font-weight:700;color:var(--soft);background:var(--bg);border-radius:7px;padding:1px 7px}
  .col-h .uline{height:2px;margin-top:8px;border-radius:2px}
  .col-body{display:flex;flex-direction:column;gap:14px;min-height:30px}

  .card{background:var(--card);border-radius:12px;padding:16px;box-shadow:0 1px 2px rgba(20,25,34,.05),0 6px 16px -10px rgba(20,25,34,.18);cursor:pointer;transition:.14s;animation:pop .2s ease both}
  @keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .card:hover{box-shadow:0 0 0 2px var(--green),0 10px 22px -12px rgba(20,25,34,.3);transform:translateY(-1px)}
  .card .crow{display:flex;gap:9px}
  .card .uic{flex:none;margin-top:1px}
  .card .uic svg{width:18px;height:18px;stroke:#000;fill:none}
  .card .body{display:flex;flex-direction:column;gap:7px;min-width:0;flex:1}
  .card .ttl{font-size:15px;font-weight:700;color:var(--kanban);line-height:1.25}
  .card .msg{font-size:14px;font-weight:500;color:var(--msg);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .agente{font-size:13px;font-weight:500;color:var(--blue)}
  .card .date{font-size:13px;font-weight:500;color:var(--kanban);text-align:right;margin-top:4px}
  .card .prio{display:inline-block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#b5740a;background:#fdeccd;border-radius:6px;padding:1px 7px;margin-left:6px;vertical-align:middle}
  .empty{font-size:13px;color:var(--gray4);text-align:center;padding:20px 8px}
  .addcol{width:280px;flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--soft);min-height:120px;font-size:14px;font-weight:500;padding-top:40px}
  .addcol .plus{width:34px;height:34px;display:grid;place-items:center;font-size:24px;line-height:0;color:var(--ink)}

  .foot-note{padding:14px 26px 4px;font-size:11px;color:var(--soft)}
  .foot-note b{color:var(--ink)}

  /* ---------- drawer (validación) ---------- */
  .scrim{position:fixed;inset:0;background:rgba(14,31,28,.34);opacity:0;pointer-events:none;transition:.25s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(640px,98vw);background:var(--card);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column;box-shadow:-30px 0 60px -34px rgba(14,31,28,.4)}
  .drawer.show{transform:none}
  .dh{padding:18px 20px;border-bottom:1px solid var(--border-in)}
  .dh .crow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .dh .x{margin-left:auto;width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--soft);cursor:pointer;font-size:15px}
  .dh h2{font-size:17px;font-weight:700;margin:0;line-height:1.25;color:var(--ink)}
  .deptag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
  .deptag .dot{width:6px;height:6px;border-radius:50%}
  .dh .ag{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--soft);margin-top:9px}
  .dh .ag .mini{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;overflow:hidden}
  .dh .ag .mini svg{width:13px;height:13px}
  .dbody{flex:1;overflow:auto;padding:18px 20px;display:flex;flex-direction:column;gap:16px}
  .blk .l{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--soft);margin-bottom:7px;display:flex;align-items:center;gap:7px}
  .l .d{width:7px;height:7px;border-radius:50%}
  .prop{background:var(--bg);border-radius:12px;padding:13px 14px;font-size:14px;line-height:1.5;white-space:pre-wrap;color:var(--ink)}
  .why{background:var(--green-soft);border:1px solid #aef0cf;border-radius:12px;padding:11px 13px;font-size:13px;line-height:1.45;color:#0c5c33}
  .meta{display:flex;gap:8px;flex-wrap:wrap}
  .pill{font-size:11px;color:var(--soft);background:var(--bg);border:1px solid var(--border-in);border-radius:20px;padding:3px 10px}
  .pill b{color:var(--ink)}
  .chat{display:flex;flex-direction:column;gap:9px}
  .msgb{max-width:86%;padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.45}
  .msgb.agente{background:var(--bg);align-self:flex-start;border-bottom-left-radius:4px}
  .msgb.agente .f{font-size:10px;color:#0c8f4e;font-weight:700;margin-bottom:3px}
  .msgb.yo{background:var(--green);color:var(--green-ink);align-self:flex-end;border-bottom-right-radius:4px;font-weight:500}
  .chat-in{display:flex;gap:8px;padding:13px 16px;border-top:1px solid var(--border-in);background:#fafafa}
  .chat-in input{flex:1;background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-family:var(--font);font-size:13px;outline:none}
  .chat-in input:focus{border-color:var(--green)}
  .chat-in button{width:44px;border:0;border-radius:10px;background:var(--green);color:var(--green-ink);font-weight:800;font-size:16px;cursor:pointer}
  .actions{display:flex;gap:9px;padding:14px 16px;border-top:1px solid var(--border-in)}
  .btn{flex:1;border-radius:10px;padding:12px;font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;border:1px solid var(--border)}
  .btn.ap{background:var(--green);color:var(--green-ink);border-color:transparent}
  .btn.ap:hover{background:var(--green-h)}
  .btn.re{background:#fff;color:var(--reject);border-color:#f6cdd6}.btn.re:hover{background:#fdeef1}
  .btn.ed{background:#fff;color:var(--ink);border-color:var(--border)}.btn.ed:hover{background:var(--bg)}
  .done-b{margin:0 16px 16px;padding:12px;border-radius:10px;background:#e6f6ff;border:1px solid #bfe6ff;color:#0a6aa3;font-size:13px;text-align:center;font-weight:600}
  /* ---- superficies de validación ---- */
  .auton{font-size:10px;font-weight:700;border-radius:20px;padding:2px 9px;border:1px solid}
  .auton.sug{color:#b5740a;background:#fdeccd;border-color:#f3d49a}
  .auton.cop{color:#0a6aa3;background:#e6f6ff;border-color:#bfe6ff}
  .auton.auto{color:#0c8f4e;background:var(--green-soft);border-color:#aef0cf}
  .surf{border:1px solid var(--border-in);border-radius:12px;overflow:hidden}
  .surf-h{background:var(--bg);padding:8px 13px;font-size:11px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:7px}
  /* draft */
  .draft-meta{font-size:12px;color:var(--soft);padding:10px 14px 0}
  .draft-meta b{color:var(--ink)}
  .draft-body{padding:12px 14px;font-size:13.5px;line-height:1.55;white-space:pre-wrap;color:var(--ink);max-height:260px;overflow:auto}
  .chk{padding:8px 14px 12px;display:flex;flex-direction:column;gap:6px}
  .chk div{font-size:12px;color:var(--msg);display:flex;gap:7px;align-items:flex-start}
  .chk div::before{content:"☑";color:var(--green);}
  /* table */
  table.cmp{width:100%;border-collapse:collapse;font-size:12.5px}
  table.cmp th,table.cmp td{padding:8px 10px;border-bottom:1px solid var(--border-in);text-align:left}
  table.cmp th{background:var(--bg);color:var(--kanban);font-weight:700}
  table.cmp td:first-child{color:var(--soft);font-weight:600}
  table.cmp .reco{background:var(--green-soft)}
  table.cmp th.reco{color:var(--green-ink);background:var(--green)}
  .cmp-nota{padding:11px 14px;font-size:12.5px;color:#0c5c33;background:var(--green-soft);line-height:1.45}
  /* findings */
  .find{display:flex;flex-direction:column}
  .find .it{display:flex;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border-in)}
  .find .it:last-child{border-bottom:0}
  .find .sev{flex:none;width:8px;height:8px;border-radius:50%;margin-top:6px}
  .sev.alto{background:var(--reject)}.sev.medio{background:#e8920c}.sev.info{background:var(--blue)}
  .find .tx{font-size:13px;color:var(--ink);line-height:1.4}
  .find .fu{font-size:11px;color:var(--soft);margin-top:3px}
  .find-src{padding:9px 14px;font-size:11px;color:var(--soft);background:var(--bg);display:flex;gap:6px;flex-wrap:wrap}
  .find-src span{border:1px solid var(--border-in);border-radius:20px;padding:1px 8px;background:#fff}
  /* form */
  .frm{display:flex;flex-direction:column}
  .frm .row{display:flex;justify-content:space-between;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border-in)}
  .frm .row:last-child{border-bottom:0}
  .frm .k{font-size:12px;color:var(--soft);font-weight:600;flex:none;width:42%}
  .frm .v{font-size:13px;color:var(--ink);text-align:right}
  .frm .v small{display:block;font-size:10.5px;color:var(--soft);font-weight:500}
  .frm .row.diff{background:#fff5f6}.frm .row.diff .v{color:var(--reject);font-weight:700}
  .frm-dest{padding:9px 14px;font-size:11px;color:var(--soft);background:var(--bg)}
  /* steps */
  .stp{display:flex;flex-direction:column;padding:6px 0}
  .stp .s{display:flex;gap:12px;padding:9px 14px;position:relative}
  .stp .dot{flex:none;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;border:2px solid var(--border)}
  .stp .s.hecho .dot{background:var(--green);border-color:var(--green);color:var(--green-ink)}
  .stp .s.actual .dot{background:#fff;border-color:var(--green);color:var(--green-ink);box-shadow:0 0 0 3px var(--green-soft)}
  .stp .s .nm{font-size:13px;font-weight:600;color:var(--ink)}
  .stp .s.pendiente .nm{color:var(--gray4)}
  .stp .s .de{font-size:11.5px;color:var(--soft);margin-top:2px}
  .stp .s.actual .de{color:var(--ink)}
  .firma-gate{margin:0 16px 12px;padding:11px 13px;border-radius:10px;background:#fff7e6;border:1px solid #f3d49a;font-size:12px;color:#8a5a05}
  .nav.on{background:var(--side-2)}.nav.on svg{stroke:var(--green)}
  /* ---- centro de operaciones ---- */
  .centro{display:flex;flex-direction:column;gap:22px}
  .ctitle{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .ctitle h1{font-size:20px;font-weight:800;margin:0;color:var(--ink)}
  .ctitle .sub{font-size:13px;color:var(--soft)}
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
  .kpi{background:var(--card);border-radius:14px;padding:20px 18px}
  .kpi .n{font-size:26px;font-weight:800;color:var(--ink);line-height:1}
  .kpi .l{font-size:12px;color:var(--soft);margin-top:6px}
  .kpi.alert .n{color:var(--reject)} .kpi.good .n{color:#0c8f4e}

  /* ====================== VISTA AGENTE (VECTOR) ====================== */
  .atabs{display:inline-flex;gap:7px;flex-wrap:wrap;background:var(--card);padding:7px;border-radius:11px}
  .atab{display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;background:transparent;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;transition:.14s}
  .atab svg{width:16px;height:16px;stroke:var(--ink)}
  .atab:hover{background:#eceef0}
  .atab.on{background:var(--green);color:var(--green-ink)} .atab.on svg{stroke:var(--green-ink)}
  /* layout carátula + chat */
  .vec-grid{display:grid;grid-template-columns:340px 1fr;gap:20px;margin-top:16px;align-items:stretch;height:calc(100vh - 198px);min-height:460px}
  .vec-left{display:flex;flex-direction:column;gap:14px;min-height:0;overflow:hidden}
  .vlist{flex:1;min-height:0;overflow-y:auto;background:var(--card);border-radius:16px;padding:12px 14px}
  /* carátula */
  .vcard{position:relative;background:linear-gradient(145deg,#25935D 0%,#0E1F1C 100%);border-radius:20px;padding:18px;color:#fff;overflow:hidden;box-shadow:0 12px 30px -16px rgba(3,150,90,.55)}
  .vcard .gear{position:absolute;top:16px;left:16px;width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.14);display:grid;place-items:center;cursor:pointer}
  .vcard .gear svg{width:18px;height:18px;stroke:#fff}
  .vcard .tog{position:absolute;top:18px;right:16px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#2effa0}
  .vtoggle{width:42px;height:22px;border-radius:20px;background:rgba(255,255,255,.3);padding:3px;display:inline-flex;align-items:center;cursor:pointer;transition:.16s}
  .vtoggle>i{width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .16s}
  .vtoggle.on{background:#0fd074} .vtoggle.on>i{transform:translateX(20px)}
  .vcard .vcard-row{display:flex;align-items:center;gap:14px;margin-top:6px}
  .vcard .vcard-id{flex:1;min-width:0}
  .vcard .photo{flex:none;display:flex;align-items:center;justify-content:center;height:72px;width:72px}
  .vcard .photo img{height:72px;width:72px;object-fit:contain;filter:drop-shadow(0 6px 12px rgba(0,0,0,.35))}
  .vcard .photo svg{width:40px;height:40px;color:#fff}
  .vcard .vname{text-align:left;font-weight:800;font-size:17px;line-height:1.1;color:#fff}
  .vcard .vrole{text-align:left;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.78);margin-top:2px}
  .vcard .stats{display:flex;justify-content:space-between;gap:14px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.18)}
  .vstat .l{font-size:11px;font-weight:600;color:rgba(255,255,255,.78)}
  .vstat .n{font-size:14px;font-weight:800;margin-top:2px;color:#fff}
  .vstat.r{text-align:right}
  .vcard-cats{margin-top:14px;border-top:1px solid rgba(255,255,255,.18);padding-top:12px}
  .vcc-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:12.5px;font-weight:700;color:#fff}
  .vcc-head .vcc-n{display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:rgba(255,255,255,.2);font-size:11px;margin-left:4px}
  .vcc-head svg{width:16px;height:16px;stroke:#fff;transition:.2s}
  .vcard-cats.open .vcc-head svg{transform:rotate(180deg)}
  .vcc-body{display:none;margin-top:8px}
  .vcard-cats.open .vcc-body{display:block}
  .vcat-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.12);cursor:pointer}
  .vcat-row:hover .vcat-nm{text-decoration:underline}
  .vcat-nm{font-size:12.5px;color:rgba(255,255,255,.92)}
  .vcat-perm{font-size:10px;font-weight:700;color:rgba(255,255,255,.85);background:rgba(255,255,255,.16);border-radius:12px;padding:2px 8px;flex:none}
  .vcat-perm.w{background:var(--green);color:var(--green-ink)}
  .vcat-empty{font-size:12px;color:rgba(255,255,255,.6);padding:6px 0}
  .vcc-foot{font-size:11px;color:rgba(255,255,255,.55);margin-top:8px}
  .vbox{background:var(--card);border-radius:16px;padding:16px 16px}
  .vbox-tools{padding:12px 14px}
  /* buscador + nuevo */
  .vtools{display:flex;gap:10px;align-items:center}
  .vtools .vs{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:11px;padding:11px 13px}
  .vtools .vs svg{width:16px;height:16px;stroke:var(--gray4)}
  .vtools .vs input{flex:1;border:0;outline:none;background:transparent;font-family:var(--font);font-size:13.5px;color:var(--ink)}
  .vtools .vs input::placeholder{color:var(--gray4)}
  .vnew{background:var(--green);color:var(--green-ink);border:0;border-radius:11px;padding:11px 18px;font-family:var(--font);font-weight:600;font-size:13.5px;cursor:pointer;transition:.14s}
  .vnew:hover{background:var(--green-h)}
  /* grupos de chats */
  .vgroup+.vgroup{margin-top:10px}
  .vgh{display:flex;align-items:center;justify-content:space-between;color:var(--soft);font-size:14px;font-weight:500;cursor:pointer;padding:8px 4px;border-bottom:1px solid var(--border-in)}
  .vgh svg{width:16px;height:16px;stroke:var(--soft);transition:.2s}
  .vgroup.closed .vgh svg{transform:rotate(-90deg)} .vgroup.closed .vitems{display:none}
  .vitems{display:flex;flex-direction:column;padding:6px 0}
  .vitem{padding:9px 10px;font-weight:700;color:var(--kanban);font-size:13.5px;cursor:pointer;border-radius:9px;transition:.14s}
  .vitem:hover{background:var(--bg)} .vitem.on{background:var(--green-soft);color:#0c5c33}
  /* chat */
  .vchat{background:var(--card);border-radius:18px;display:flex;flex-direction:column;height:100%;min-height:0;overflow:hidden}
  .vthread{flex:1;overflow:auto;padding:24px 26px;display:flex;flex-direction:column;gap:16px}
  .vmsg{display:flex;align-items:flex-end;gap:10px;max-width:74%}
  .vmsg.ag{align-self:flex-start}
  .vmsg.me{align-self:flex-end;flex-direction:row-reverse}
  .vmsg .mav{width:30px;height:30px;border-radius:50%;flex:none;display:grid;place-items:center;overflow:hidden;background:radial-gradient(circle at 50% 30%,var(--comercial),#16302a)}
  .vmsg .mav svg{width:17px;height:17px;color:#fff}
  .vmsg .mav img{width:100%;height:100%;object-fit:cover}
  .vmsg .mav.u{background:radial-gradient(circle at 50% 30%,#8a5cf0,#2a1f4a)}
  .vmsg .bub{padding:11px 15px;border-radius:16px;font-size:13.5px;line-height:1.45}
  .vmsg.ag .bub{background:var(--bg);color:var(--ink);border-bottom-left-radius:5px}
  .vmsg.me .bub{background:var(--green);color:var(--green-ink);border-bottom-right-radius:5px;font-weight:500}
  .vchat-in{position:relative;display:flex;gap:12px;padding:16px 18px;border-top:1px solid var(--border-in);background:#fafafa}
  .vchat-in input{flex:1;background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 15px;font-family:var(--font);font-size:14px;color:var(--ink);outline:none}
  .vchat-in input:focus{border-color:var(--green)}
  .vsend{background:var(--green);color:var(--green-ink);border:0;border-radius:12px;padding:0 26px;font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;transition:.14s}
  .vsend:hover{background:var(--green-h)}
  .vfab{position:absolute;left:50%;top:-26px;transform:translateX(-50%);width:52px;height:52px;border-radius:50%;background:#ff2bb5;color:#fff;border:4px solid #fff;display:grid;place-items:center;font-weight:800;font-size:20px;cursor:pointer;box-shadow:0 8px 20px -8px rgba(255,43,181,.7)}
  /* paneles placeholder de otras pestañas */
  .agt-ph{background:var(--card);border-radius:18px;padding:40px;margin-top:20px;text-align:center;color:var(--soft);font-size:14px;line-height:1.6}
  .agt-ph .ic{width:56px;height:56px;border-radius:16px;background:var(--bg);display:grid;place-items:center;margin:0 auto 14px}
  .agt-ph .ic svg{width:26px;height:26px;stroke:var(--green)}
  .agt-ph b{color:var(--ink);font-size:16px;display:block;margin-bottom:6px}
  @media(max-width:1100px){.vec-grid{grid-template-columns:1fr;height:auto;min-height:0}.vec-left{overflow:visible}.vlist{overflow:visible}.vchat{height:520px}}

  /* ============ FUNCIONES DEL AGENTE ============ */
  .fn-wrap{position:relative}
  .fn-fab{position:absolute;top:-2px;right:-2px;width:50px;height:50px;border-radius:50%;background:#ff2bb5;color:#fff;border:4px solid #fff;display:grid;place-items:center;font-weight:800;font-size:19px;cursor:pointer;box-shadow:0 8px 20px -8px rgba(255,43,181,.7);z-index:2}
  .fn-bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .fn-views{display:flex;gap:10px}
  .u-grid-fn{grid-template-columns:minmax(170px,1.3fr) minmax(110px,.9fr) minmax(280px,2fr) minmax(130px,1fr) 130px}
  .u-grid-fndoc{grid-template-columns:minmax(150px,1fr) minmax(340px,2.4fr) minmax(240px,1.3fr)}
  .u-trow.u-grid-fn,.u-trow.u-grid-fndoc{align-items:center}
  .fn-cell{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
  .fn-pill{display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:22px;padding:6px 15px;font-size:13px;font-weight:500;color:var(--ink);background:#fff;white-space:nowrap}
  .fn-estado{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;color:var(--ink)}
  /* modal de función */
  .fn-pub{width:auto;padding:11px 30px}
  .fn-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px;margin-top:6px}
  .fn-h{font-size:20px;font-weight:800;color:var(--ink);margin:4px 0 18px}
  .fn-fields{display:flex;flex-direction:column;gap:20px}
  .fn-cerebro{display:flex;flex-direction:column}
  .fn-cerebro .ufield{flex:1}
  .fn-cerebro textarea{min-height:600px;flex:1}
  .fn-docbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin:6px 0 22px}
  .fn-docbar .u-search{max-width:none;flex:1}
  .fn-assoc-intro{font-size:13px;color:var(--soft);margin:4px 0 16px;line-height:1.5}
  .fn-assoc-list{display:flex;flex-direction:column;gap:8px}
  .fn-assoc-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:13px;background:var(--card);cursor:pointer;transition:.14s}
  .fn-assoc-row:hover{border-color:var(--gray4)}
  .fn-assoc-row.on{border-color:var(--green);background:var(--green-soft)}
  .fn-assoc-glyph{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px}
  .fn-assoc-main{flex:1;min-width:0;font-size:13.5px;color:var(--ink);display:flex;flex-direction:column;align-items:flex-start;gap:4px}
  .fn-assoc-main b{font-weight:600}
  .fn-assoc-main small{color:var(--soft);font-weight:500;font-size:11.5px}
  .fn-assoc-check{width:24px;height:24px;border-radius:50%;flex:none;border:1.5px solid var(--gray4);display:grid;place-items:center;background:#fff}
  .fn-assoc-check svg{width:14px;height:14px;stroke:#fff;fill:none;opacity:0}
  .fn-assoc-row.on .fn-assoc-check{background:var(--green);border-color:var(--green)}
  .fn-assoc-row.on .fn-assoc-check svg{opacity:1}
  .fn-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .fn-days{display:flex;gap:7px;flex-wrap:wrap}
  .fn-day{padding:7px 12px;border:1px solid var(--border);border-radius:9px;font-size:12.5px;font-weight:600;color:var(--soft);cursor:pointer;transition:.14s}
  .fn-day.on{background:var(--green);border-color:var(--green);color:var(--green-ink)}
  .fn-assoc-row.static{cursor:default}
  .fn-assoc-row.static:hover{border-color:var(--border)}
  .fn-assoc-rm{width:28px;height:28px;border-radius:8px;border:1px solid var(--border-in);background:#fff;color:var(--soft);cursor:pointer;display:grid;place-items:center;flex:none;transition:.14s}
  .fn-assoc-rm:hover{background:#fdecef;color:#b3284a;border-color:#f6cdd6}
  .fn-assoc-rm svg{width:14px;height:14px;stroke:currentColor;fill:none}
  .fn-empty{font-size:13px;color:var(--soft);padding:20px;text-align:center;border:1px dashed var(--border);border-radius:12px;line-height:1.5}
  .umodal-card.pick{width:min(560px,96vw)}
  .pick-search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border-in);border-radius:11px;padding:11px 13px;margin-bottom:14px}
  .pick-search svg{width:16px;height:16px;stroke:var(--gray4)}
  .pick-search input{flex:1;border:0;outline:none;background:transparent;font-family:var(--font);font-size:14px;color:var(--ink)}
  .pick-list{display:flex;flex-direction:column;gap:8px;max-height:48vh;overflow-y:auto;padding:2px}
  .pick-foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;font-size:12.5px;color:var(--soft)}
  @media(max-width:820px){.fn-grid{grid-template-columns:1fr}.fn-cerebro textarea{min-height:240px}.fn-2col{grid-template-columns:1fr}}

  /* ====================== MÓDULO HERRAMIENTAS (conectores) ====================== */
  .tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;margin-top:26px}
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:18px}
  .cat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:.14s;display:flex;flex-direction:column;gap:10px}
  .cat-card:hover{border-color:var(--green);box-shadow:0 10px 26px -16px rgba(0,0,0,.3);transform:translateY(-1px)}
  .cat-top{display:flex;align-items:center;gap:12px}
  .cat-tile{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;flex:none}
  .cat-tile svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2}
  .cat-meta{display:flex;flex-direction:column;gap:4px;min-width:0}
  .cat-name{font-size:15px;font-weight:700;color:var(--ink)}
  .cat-tipo{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;width:max-content;display:inline-block}
  .cat-tipo.maestro{color:var(--green-ink);background:var(--green-soft)}
  .cat-tipo.transaccional{color:#0a5ca8;background:#e2f0ff}
  .cat-desc{font-size:12.5px;color:var(--soft);line-height:1.5;flex:1}
  .cat-stat{font-size:13px;font-weight:700;color:var(--ink)}
  .cat-ag{font-size:11.5px;color:var(--soft);display:flex;flex-wrap:wrap;gap:6px;align-items:center;border-top:1px solid var(--border-in);padding-top:10px}
  .cat-agchip{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border-in);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--ink)}
  .cat-perm-edit{display:inline-flex;align-items:center;gap:4px;cursor:pointer;padding:1px 7px;border-radius:12px;background:#eef0f2;color:var(--soft);font-weight:700}
  .cat-perm-edit:hover{background:#e3e6e9;color:var(--ink)}
  .cat-perm-edit.w{background:var(--green-soft);color:var(--green-ink)}
  .cat-perm-edit svg{width:11px;height:11px;stroke:currentColor;fill:none}
  .cat-agchip .dot{width:7px;height:7px;border-radius:50%;flex:none}
  .cat-bind{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:4px 0 16px;font-size:12.5px;color:var(--soft)}
  .fic-grid{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--card)}
  .fic-row{display:flex;justify-content:space-between;gap:16px;padding:12px 16px;border-bottom:1px solid var(--border-in)}
  .fic-row:last-child{border-bottom:0}
  .fic-k{font-size:13px;color:var(--soft);font-weight:600}
  .fic-v{font-size:13px;color:var(--ink);text-align:right;max-width:60%;overflow:hidden;text-overflow:ellipsis}
  .fic-req{color:var(--reject);font-weight:700}
  .fic-doc{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 16px;border:1px solid var(--border-in);border-radius:12px;margin-top:8px}
  .fic-docname{font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px}
  .fic-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px}
  .fic-badge.req{background:#fdecef;color:#b3284a}
  .fic-badge.opt{background:var(--bg);color:var(--soft)}
  .fic-status{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px}
  .fic-status.ok{background:var(--green-soft);color:var(--green-ink)}
  .fic-status.pend{background:#fff3e0;color:#9a6a00}
  .cat-table{width:100%;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--card)}
  .cat-tr{display:grid;align-items:center;border-bottom:1px solid var(--border-in)}
  .cat-tr:last-child{border-bottom:0}
  .cat-thead{background:#fafafa;border-bottom:1px solid var(--border)}
  .cat-th{font-size:12px;font-weight:700;color:var(--soft);padding:12px 14px}
  .cat-td{font-size:13px;color:var(--ink);padding:13px 14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cat-tr.click{cursor:pointer;transition:.12s}
  .cat-tr.click:hover{background:var(--green-soft)}
  .cat-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--green-soft);color:var(--green-ink);display:inline-block}
  .cat-sec{font-size:13px;font-weight:700;color:var(--ink);margin:18px 0 8px}
  .vec-catrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-in)}
  .vec-catrow:last-child{border-bottom:0}
  .vec-catname{font-size:13px;font-weight:600;color:var(--ink)}
  .vec-catperm{font-size:10.5px;font-weight:700;color:var(--green-ink);background:var(--green-soft);padding:2px 8px;border-radius:20px;white-space:nowrap}
  .vec-catperm.w{color:#0a5ca8;background:#e2f0ff}
  .tool-card{background:var(--card);border:1px solid var(--border-in);border-radius:16px;padding:16px 18px;cursor:pointer;transition:.16s;display:flex;flex-direction:column;gap:10px}
  .tool-card:hover{border-color:var(--green);box-shadow:0 10px 24px -16px rgba(3,150,90,.5);transform:translateY(-1px)}
  .tool-top{display:flex;align-items:center;gap:12px}
  .tool-tile{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;flex:none}
  .tool-meta{min-width:0;display:flex;flex-direction:column}
  .tool-name{font-weight:700;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .tool-new{font-size:11px;font-weight:700;color:#0c9b53}
  .tool-add{margin-left:auto;width:32px;height:32px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--ink);font-size:19px;line-height:0;display:grid;place-items:center;flex:none;transition:.14s}
  .tool-add:hover{border-color:var(--green);color:#0c9b53}
  .tool-add.ok{background:var(--green);border-color:var(--green);color:var(--green-ink)}
  .tool-add.ok svg{width:16px;height:16px;stroke:var(--green-ink)}
  .tool-desc{font-size:12.5px;color:var(--soft);line-height:1.45}
  .tool-conn{font-size:11px;font-weight:700;color:var(--blue)}

  /* ====================== MÓDULO FUNCIONES (catálogo de casos de uso por agente) ====================== */
  .fnmod-group{margin-top:26px}
  .fnmod-grouphd{display:flex;align-items:center;gap:9px;margin:0 2px 14px}
  .fnmod-dot{width:11px;height:11px;border-radius:50%;flex:none}
  .fnmod-gtitle{font-size:14.5px;font-weight:700;color:var(--ink)}
  .fnmod-gsub{font-size:12.5px;color:var(--soft);font-weight:500}
  .fnmod-count{margin-left:auto;font-size:12px;font-weight:700;color:var(--soft);background:var(--bg);border-radius:20px;padding:4px 12px}
  .fnmod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px}
  .fnmod-card{background:var(--card);border:1px solid var(--border-in);border-radius:16px;padding:16px 18px;cursor:pointer;transition:.16s;display:flex;flex-direction:column;gap:12px}
  .fnmod-card:hover{border-color:var(--green);box-shadow:0 10px 24px -16px rgba(3,150,90,.5);transform:translateY(-1px)}
  .fnmod-top{display:flex;align-items:flex-start;gap:12px}
  .fnmod-tile{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;flex:none}
  .fnmod-tile svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2}
  .fnmod-meta{min-width:0;flex:1;display:flex;flex-direction:column;gap:3px}
  .fnmod-code{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--soft)}
  .fnmod-name{font-weight:700;font-size:15px;color:var(--ink);line-height:1.25}
  .fnmod-desc{font-size:12.5px;color:var(--soft);line-height:1.5}
  .fnmod-chips{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .fnmod-chip{display:inline-flex;align-items:center;gap:6px;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600}
  .fnmod-chip.model{background:#eef1f4;color:#3a4150}
  .fnmod-chip.canal{background:var(--green-soft);color:var(--green-ink)}
  .fnmod-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid var(--border-in);padding-top:12px;flex-wrap:wrap}
  .fnmod-users{display:flex;flex-wrap:wrap;gap:6px}
  .fnmod-uchip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink);background:var(--bg);border-radius:20px;padding:4px 10px 4px 4px}
  .fnmod-uchip .ua{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:8.5px;font-weight:800;color:#fff;flex:none}
  .fnmod-sw{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--soft)}

  /* ====================== VISTAS DE SOLO-LECTURA (Mi Perfil / Datos de facturación) ====================== */
  .pfv-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 22px}
  .pfv-row{display:flex;flex-direction:column;gap:5px;min-width:0}
  .pfv-row.full{grid-column:1/-1}
  .pfv-label{font-size:12px;color:var(--soft);font-weight:600}
  .pfv-val{font-size:14px;color:var(--ink);font-weight:500;line-height:1.55;word-break:break-word}
  .pfv-val.empty{color:var(--gray4);font-weight:400}

  /* ---- modal de contraseña (ojitos + requisitos) ---- */
  .pw-field{position:relative}
  .pw-field input{padding-right:44px}
  .pw-eye{position:absolute;right:8px;top:34px;width:30px;height:30px;border:0;background:transparent;cursor:pointer;display:grid;place-items:center;color:var(--soft)}
  .pw-eye:hover{color:var(--ink)}
  .pw-eye svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2}
  .pw-reqs{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .pw-req{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--soft);transition:.14s}
  .pw-req .rc{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--gray4);display:grid;place-items:center;flex:none;transition:.14s}
  .pw-req .rc svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:3;opacity:0}
  .pw-req.ok{color:var(--green-ink);font-weight:600}
  .pw-req.ok .rc{background:var(--green);border-color:var(--green)}
  .pw-req.ok .rc svg{opacity:1}
  .pw-err{color:var(--reject);font-size:12.5px;font-weight:600;margin-top:12px;display:none}

  /* ---- dropdown de color y filas de etapa (Crear Funnel / Nueva Etapa) ---- */
  .etapa-color{position:relative;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:0 14px}
  .etapa-color:focus-within{border-color:var(--green)}
  .ecol-dot{width:18px;height:18px;border-radius:50%;flex:none}
  .etapa-color select{appearance:none;border:0;background:transparent;width:auto;flex:1;min-width:0;padding:12px 24px 12px 0;font-family:var(--font);font-size:14px;color:var(--ink);outline:none;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%23141922' stroke-width='2'><path d='m4 6 4 4 4-4'/></svg>");background-repeat:no-repeat;background-position:right center}
  .ecol-lbl{font-size:13px;font-weight:600;color:var(--soft);margin-bottom:6px;display:block}
  .etapa-row{display:grid;grid-template-columns:1fr 1fr auto;gap:14px 22px;align-items:end;margin-bottom:16px}
  .etapa-add{width:100%;border:1px dashed var(--border);background:#fff;border-radius:12px;padding:13px 0;display:grid;place-items:center;cursor:pointer;color:var(--soft);transition:.14s}
  .etapa-add:hover{border-color:var(--green);color:var(--green-ink)}
  .etapa-add svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
  .etapa-del{width:44px;height:44px;border-radius:11px;border:1px solid var(--border);background:#fff;color:var(--soft);cursor:pointer;display:grid;place-items:center;transition:.14s;align-self:end}
  .etapa-del:hover{border-color:var(--reject);color:var(--reject)}
  .etapa-del svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2}

  /* ---- chip de agente en tarjetas de Funciones ---- */
  .fnmod-agent{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--soft);background:var(--bg);border-radius:20px;padding:3px 10px 3px 8px}
  .fnmod-agent .ad{width:9px;height:9px;border-radius:50%;flex:none}

  /* ---- segundo nivel de modal (apilado) ---- */
  #umodal2{z-index:70}

  /* ---- sidebar colapsable -> riel de iconos ---- */
  .shell{transition:grid-template-columns .22s ease}
  .shell.nav-collapsed{grid-template-columns:74px 1fr}
  .logo{overflow:hidden}
  .side{overflow-x:hidden}
  .shell.nav-collapsed .logo{padding:0;justify-content:center}
  .shell.nav-collapsed .logo-img{height:34px;width:30px;object-fit:cover;object-position:left center}
  .shell.nav-collapsed .side{padding:18px 12px;align-items:stretch}
  .shell.nav-collapsed .nav,.shell.nav-collapsed .grouphead{justify-content:center;gap:0;padding:11px 0;font-size:0}
  .shell.nav-collapsed .nav svg,.shell.nav-collapsed .grouphead svg.ic{margin:0}
  .shell.nav-collapsed .agent{justify-content:center;gap:0;padding:7px 0}
  .shell.nav-collapsed .modlabel{display:none}
  .shell.nav-collapsed .grouphead .chev,.shell.nav-collapsed .grouphead .allpend,
  .shell.nav-collapsed .agent .t,.shell.nav-collapsed .agent .pend{display:none}
  .shell.nav-collapsed hr.sep{margin:10px 8px}
  .navtoggle{width:38px;height:38px;border-radius:9px;border:0;background:var(--side-2);color:#fff;cursor:pointer;display:grid;place-items:center;transition:.14s;flex:none}
  .navtoggle:hover{background:rgba(255,255,255,.18)}
  .navtoggle svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}

  /* ---- Mi Perfil (vista) rediseño ---- */
  .pf-hero{display:flex;gap:20px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px 24px;margin-top:18px}
  .pf-ava{width:72px;height:72px;border-radius:20px;flex:none;display:grid;place-items:center;font-size:24px;font-weight:800;color:var(--green-ink);background:linear-gradient(135deg,var(--green),#00d96a)}
  .pf-id{min-width:0;flex:1}
  .pf-name{font-size:22px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:10px;flex-wrap:wrap;line-height:1.15}
  .pf-role{font-size:11.5px;font-weight:700;color:var(--green-ink);background:var(--green-soft);padding:3px 11px;border-radius:20px}
  .pf-sub{font-size:13.5px;color:var(--soft);margin-top:5px}
  .pf-chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:13px}
  .pf-chip{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--ink);background:var(--bg);border:1px solid var(--border-in);border-radius:10px;padding:7px 12px}
  .pf-chip svg{width:15px;height:15px;stroke:var(--soft);fill:none;stroke-width:2}
  .pf-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px 24px;margin-top:18px}
  .pf-hd{display:flex;align-items:center;gap:11px}
  .pf-ic{width:34px;height:34px;border-radius:10px;background:var(--green-soft);display:grid;place-items:center;flex:none}
  .pf-ic svg{width:18px;height:18px;stroke:var(--green-ink);fill:none;stroke-width:2}
  .pf-hd h2{font-size:15px;font-weight:700;color:var(--ink);margin:0}
  .pf-sb{font-size:12.5px;color:var(--soft);margin:2px 0 0}
  .pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px 32px;margin-top:18px}
  .pf-field{display:flex;flex-direction:column;gap:5px;min-width:0}
  .pf-field.full{grid-column:1/-1}
  .pf-field .k{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--soft)}
  .pf-field .v{font-size:14.5px;color:var(--ink);font-weight:500;line-height:1.55;word-break:break-word}
  .pf-field .v.empty{color:var(--gray4);font-weight:400}
  .pf-doc{display:flex;align-items:center;gap:11px;border:1px solid var(--border-in);background:#fff;border-radius:11px;padding:11px 14px;margin-bottom:8px}
  .pf-doc .di{width:34px;height:34px;border-radius:9px;background:var(--green-soft);display:grid;place-items:center;flex:none}
  .pf-doc .di svg{width:17px;height:17px;stroke:var(--green-ink);fill:none;stroke-width:2}
  .pf-doc .dn{flex:1;min-width:0;font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pf-doc .dt{font-size:10px;font-weight:700;color:var(--soft);background:var(--bg);border:1px solid var(--border-in);border-radius:6px;padding:2px 7px;flex:none}
  .pf-doc .dx{border:0;background:none;color:var(--gray4);cursor:pointer;font-size:15px;line-height:1;flex:none}
  .pf-doc .dx:hover{color:var(--reject)}
  .pf-doc .dv{color:var(--blue);cursor:pointer;display:grid;place-items:center;flex:none}
  .pf-doc .dv svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
  .pf-red-row{display:grid;grid-template-columns:170px 1fr 42px;gap:10px;align-items:center;margin-bottom:10px}
  .pf-red-row select,.pf-red-row input{background:#fff;border:1px solid var(--border);border-radius:9px;padding:11px 12px;font-family:var(--font);font-size:14px;color:var(--ink);outline:none}
  .pf-red-row select:focus,.pf-red-row input:focus{border-color:var(--green)}
  .pf-red-x{border:1px solid var(--border);background:#fff;border-radius:9px;height:42px;color:var(--soft);cursor:pointer;display:grid;place-items:center}
  .pf-red-x:hover{border-color:var(--reject);color:var(--reject)}
  .pf-red-x svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
  .pf-addred{display:inline-flex;align-items:center;gap:7px;border:1px dashed var(--border);background:transparent;border-radius:10px;padding:9px 14px;font-family:var(--font);font-weight:600;font-size:13px;color:var(--green-ink);cursor:pointer;margin-top:4px}
  .pf-addred:hover{border-color:var(--green);background:var(--green-soft)}
  .pf-addred svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
  .pf-legal{display:flex;gap:22px;flex-wrap:wrap;align-items:center;margin-top:16px;padding:15px 18px;background:var(--card);border:1px solid var(--border);border-radius:14px}
  .pf-legal a{color:var(--green-ink);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .pf-legal a:hover{text-decoration:underline}
  .pf-legal svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
  .legal-doc{font-size:13.5px;color:var(--ink);line-height:1.6;max-height:54vh;overflow:auto;padding:4px 6px 4px 0}
  .legal-doc h4{font-size:13.5px;font-weight:700;color:var(--ink);margin:16px 0 5px}
  .legal-doc h4:first-child{margin-top:0}
  .legal-doc p{margin:0;color:#3a4250}

  /* ---- Vista de Chats (CRM) ---- */
  .cm-wrap{display:grid;grid-template-columns:320px 1fr;gap:16px;margin-top:16px;height:600px}
  .cm-list{background:var(--card);border:1px solid var(--border-in);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
  .cm-listhd{font-size:15px;font-weight:700;color:var(--ink);padding:16px 16px 10px}
  .cm-filters{display:flex;gap:8px;padding:0 14px 12px}
  .cm-filt{display:inline-flex;align-items:center;gap:6px;border:0;background:var(--bg);color:var(--ink);font-family:var(--font);font-weight:600;font-size:12.5px;padding:7px 12px;border-radius:9px;cursor:pointer}
  .cm-filt svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
  .cm-filt.on{background:var(--green);color:var(--green-ink)} .cm-filt.on svg{stroke:var(--green-ink)}
  .cm-items{flex:1;overflow:auto}
  .cl-item{display:flex;gap:11px;align-items:center;padding:12px 14px;cursor:pointer;border-left:3px solid transparent;transition:.12s}
  .cl-item:hover{background:var(--bg)}
  .cl-item.on{background:var(--green-soft);border-left-color:var(--green)}
  .cl-av{width:40px;height:40px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:13px;font-weight:800;color:#fff;background:radial-gradient(circle at 50% 30%,#7a8aa0,#2a3340)}
  .cl-main{min-width:0;flex:1}
  .cl-top{display:flex;align-items:center;gap:8px}
  .cl-name{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cl-new{font-size:10px;font-weight:700;color:var(--blue);border:1px solid var(--blue);border-radius:20px;padding:1px 8px;flex:none}
  .cl-ch{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--soft);margin-top:3px}
  .cl-ch svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
  .cl-empty,.cm-empty2{padding:34px 18px;color:var(--soft);font-size:13px;text-align:center}
  .cm-conv{background:var(--card);border:1px solid var(--border-in);border-radius:14px;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .cm-convhd{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 18px;border-bottom:1px solid var(--border-in);flex-wrap:wrap}
  .cm-who{display:flex;align-items:center;gap:11px;min-width:0}
  .cm-name{font-size:15px;font-weight:700;color:var(--ink)}
  .cm-presence{font-size:12px;color:var(--soft);margin-top:2px}
  .cm-actions{display:flex;gap:10px}
  .cm-pausebtn{display:inline-flex;align-items:center;gap:7px;border:0;border-radius:10px;padding:9px 15px;font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer;background:var(--reject);color:#fff;transition:.14s}
  .cm-pausebtn:hover{filter:brightness(.96)}
  .cm-pausebtn.on{background:#0c8f4e}
  .cm-pausebtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
  .cm-agentbtn{display:inline-flex;align-items:center;gap:7px;border:0;border-radius:10px;padding:9px 16px;font-family:var(--font);font-weight:700;font-size:13px;cursor:pointer;background:var(--green);color:var(--green-ink);transition:.14s}
  .cm-agentbtn:hover{background:var(--green-h)}
  .cm-agentbtn svg{width:15px;height:15px;stroke:var(--green-ink);fill:none;stroke-width:2}
  .cm-thread{flex:1;overflow:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
  .cm-msg{display:flex;gap:8px;max-width:74%;align-items:flex-end}
  .cm-msg.in{align-self:flex-start}
  .cm-msg.out{align-self:flex-end;flex-direction:row-reverse}
  .cm-av{width:30px;height:30px;border-radius:50%;flex:none;overflow:hidden;display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff}
  .cm-av.cli{background:radial-gradient(circle at 50% 30%,#7a8aa0,#2a3340)}
  .cm-av.ag{background:radial-gradient(circle at 50% 30%,var(--comercial),#16302a)}
  .cm-av.col{background:radial-gradient(circle at 50% 30%,#8a5cf0,#2a1f4a)}
  .cm-av img{width:100%;height:100%;object-fit:cover}
  .cm-b{padding:11px 15px;border-radius:16px;font-size:13.5px;line-height:1.45}
  .cm-msg.in .cm-b{background:#fff;color:var(--ink);border:1px solid var(--border-in);border-bottom-left-radius:5px}
  .cm-msg.out .cm-b{background:var(--green);color:var(--green-ink);border-bottom-right-radius:5px;font-weight:500}
  .cm-pausebanner{display:flex;align-items:center;gap:8px;background:#fff4e0;color:#9a6a00;font-size:12.5px;font-weight:600;padding:9px 16px;border-top:1px solid var(--border-in)}
  .cm-pausebanner svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
  .cm-in{display:flex;gap:10px;padding:13px 16px;border-top:1px solid var(--border-in);background:#fafafa}
  .cm-in input{flex:1;background:#fff;border:1px solid var(--border);border-radius:11px;padding:12px 14px;font-family:var(--font);font-size:14px;color:var(--ink);outline:none}
  .cm-in input:focus{border-color:var(--green)}
  .cm-in button{width:48px;border:0;border-radius:11px;background:var(--green);color:var(--green-ink);cursor:pointer;display:grid;place-items:center;transition:.14s}
  .cm-in button:hover{background:var(--green-h)}
  .cm-in button svg{width:20px;height:20px;fill:var(--green-ink)}
  .cl-stage{font-size:10px;font-weight:700;border-radius:20px;padding:2px 9px;flex:none;white-space:nowrap}
  .cl-stage.pend{color:#9a6a00;background:#fff1d6}
  .cl-stage.conv{color:#0a5ca8;background:#e2f0ff}
  .cl-stage.ok{color:#0c7a43;background:var(--green-soft)}
  .cl-arch{flex:none;width:30px;height:30px;border-radius:8px;border:0;background:transparent;color:var(--gray4);cursor:pointer;display:grid;place-items:center;opacity:0;transition:.14s}
  .cl-item:hover .cl-arch,.cl-item.on .cl-arch{opacity:1}
  .cl-arch:hover{background:#fff;color:var(--ink)}
  .cl-arch svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
  .cm-iconbtn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--soft);cursor:pointer;display:grid;place-items:center;transition:.14s;flex:none}
  .cm-iconbtn:hover{border-color:var(--green);color:var(--green-ink)}
  .cm-iconbtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
  /* ---- funciones por usuario (modal Usuarios) ---- */
  .ufn-list{margin-top:8px}
  .ufn-group{margin-top:14px}
  .ufn-ghd{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--soft);padding:8px 2px 6px}
  .ufn-gdot{width:9px;height:9px;border-radius:50%;flex:none}
  .ufn-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 14px;border:1px solid var(--border-in);border-radius:12px;margin-bottom:8px;background:#fff}
  .ufn-info{display:flex;align-items:center;gap:11px;min-width:0}
  .ufn-dot{width:10px;height:10px;border-radius:50%;flex:none}
  .ufn-tx{min-width:0}
  .ufn-name{font-size:14px;font-weight:600;color:var(--ink)}
  .ufn-sub{font-size:12px;color:var(--soft);margin-top:2px}
  @media(max-width:1100px){.cm-wrap{grid-template-columns:1fr;height:auto}.cm-thread{max-height:420px}}
  /* modal conectar */
  .cnx-grid{display:grid;grid-template-columns:1fr 1fr;gap:44px;margin-top:8px}
  .cnx-h{font-size:19px;font-weight:800;color:var(--ink);margin:0 0 8px}
  .cnx-h.r{text-align:center}
  .cnx-sub{font-size:13.5px;color:var(--soft);margin-bottom:22px}
  .cnx-channels{display:flex;gap:18px;flex-wrap:wrap}
  .cnx-opt{width:158px;border:2px solid var(--border-in);border-radius:16px;padding:16px;background:#fff;cursor:pointer;transition:.14s;display:flex;flex-direction:column;gap:10px}
  .cnx-opt:hover{border-color:#bfe6cf}
  .cnx-opt.on{border-color:var(--green);box-shadow:0 10px 24px -16px rgba(3,150,90,.5)}
  .cnx-opt .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:#fff;font-weight:800}
  .cnx-opt .nm{font-size:14px;font-weight:600;color:var(--ink)}
  .cnx-opt .lnk{font-size:13px;font-weight:700;text-align:right}
  .cnx-opt .lnk.go{color:#0c9b53} .cnx-opt .lnk.done{color:var(--blue)}
  .cnx-form{display:flex;flex-direction:column;gap:20px}
  @media(max-width:820px){.cnx-grid{grid-template-columns:1fr;gap:24px}}

  /* ====================== VECTOR CRM (clientes + supervisión) ====================== */
  .crm-sub{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}

    const has=tieneAg(d.id),p=pendDep(d.id),act=(vista==='tablero'&&depFiltro===d.id)?'active':'';

  return `<article class="card" onclick='openDrawer("${t.id}")'>
    <div class="crow">
      <span class="uic"><svg viewBox="0 0 24 24"><use href="#ic-user-card"/></svg></span>

    <div class="date">${t.fecha||''}</div></article>`;
}

function _seed(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function metricsDe(dep){
  const tk=tareasEmp().filter(t=>t.dep===dep);
  const pend=tk.filter(t=>t.columna==='pendiente').length, enp=tk.filter(t=>t.columna==='en_proceso').length, hec=tk.filter(t=>t.columna==='hecho').length;
  const cf=tk.map(t=>t.confianza); const conf=cf.length?Math.round(cf.reduce((a,b)=>a+b,0)/cf.length):0;
  const sd=_seed(dep);
  const rech=2+(sd%4), edit=5+((sd>>2)%9), aprob=100-rech-edit;
  const racha=6+(sd%34), auto=8+(sd%30), highRisk=tk.some(t=>t.firma);
  const listo=(racha>=22 && aprob>=88 && !highRisk);
  const estado= pend>0?'wait':(enp>0?'work':'idle');
  return {pend,enp,hec,conf,aprob,edit,rech,racha,auto,highRisk,listo,estado};
}
function colaPrioritaria(){
  const out=[];
  tareasEmp().forEach(t=>{ if(t.columna==='hecho')return;
    const diff=(t.contenido&&(t.contenido.campos||[]).some(c=>c.diff));
    let r=null;
    if(t.firma) r='firma'; else if(t.confianza<72) r='conf'; else if(diff) r='diff';
    if(r) out.push({t,r});
  });
  const ord={firma:0,conf:1,diff:2};
  return out.sort((a,b)=>ord[a.r]-ord[b.r]).slice(0,6);
}
function logActividad(){
  const e=empresa(), L=[];
  tareasEmp().filter(t=>t.columna==='hecho').slice(0,3).forEach((t,i)=>{const d=depById(t.dep);
    L.push({ic:'✓',tx:`<b>${d.codename}</b> · ${t.titulo} — aprobado y ejecutado`,tm:['hace 6 min','hoy 09:42','ayer 17:10'][i]||'hoy'});});
  agentesEmp().slice(0,2).forEach((a,i)=>{const d=depById(a.dep),m=metricsDe(a.dep);
    L.push({ic:'⚡',tx:`<b>${d.codename}</b> resolvió ${m.auto} tareas sin intervención`,tm:['hace 22 min','hoy 08:15'][i]||'hoy'});});
  tareasEmp().filter(t=>t.columna==='en_proceso').slice(0,2).forEach((t,i)=>{const d=depById(t.dep);
    L.push({ic:'✏️',tx:`<b>${d.codename}</b> · ${t.titulo} — en revisión contigo`,tm:['hace 1 h','hoy 10:05'][i]||'hoy'});});
  return L.slice(0,7);
}
function renderCentro(){
  const e=empresa(), ags=agentesEmp();
  const tk=tareasEmp(), pend=tk.filter(t=>t.columna==='pendiente').length;
  const cf=tk.map(t=>t.confianza), confG=cf.length?Math.round(cf.reduce((a,b)=>a+b,0)/cf.length):0;
  const autoTot=ags.reduce((s,a)=>s+metricsDe(a.dep).auto,0);
  const alertas=tk.filter(t=>t.firma&&t.columna!=='hecho').length;
  const kpi=(n,l,cls)=>`<div class="kpi ${cls||''}"><div class="n">${n}</div><div class="l">${l}</div></div>`;
  const kpis=`<div class="kpis">${kpi(ags.length,'Agentes activos')}${kpi(pend,'Pendientes de validación', pend?'alert':'')}${kpi(autoTot,'Resueltas solas hoy','good')}${kpi(confG+'%','Confianza promedio')}${kpi(alertas,'Alertas de alto riesgo', alertas?'alert':'')}</div>`;

  // tabla agentes
  const rows=ags.map(a=>{const d=depById(a.dep),m=metricsDe(a.dep),au=m.highRisk?'Sugerir':'Co-pilot';
    const stt={wait:['wait','Esperándote'],work:['work','Trabajando'],idle:['idle','Al día']}[m.estado];
    return `<tr><td><div class="agc"><span class="av" style="background:${avatarTint(d)}"><svg viewBox="0 0 24 24"><use href="#ic-person"/></svg></span>
        <span class="nm">${d.codename}<small>${d.nombre}</small></span></div></td>
      <td>${autonBadge(au)}</td>
      <td><span class="num ${m.pend?'':'z'}">${m.pend}</span></td><td><span class="num ${m.enp?'':'z'}">${m.enp}</span></td><td><span class="num ${m.hec?'':'z'}">${m.hec}</span></td>
      <td class="num">${m.conf}%</td>
      <td><span class="stt ${stt[0]}"><span class="d"></span>${stt[1]}</span></td>
      <td><span class="verlink" onclick="setDep('${d.id}')">Ver tablero →</span></td></tr>`;}).join('');
  const tabla=`<div class="panel"><h3>Agentes <small>· estado en vivo</small></h3>
    <table class="ops"><thead><tr><th>Agente</th><th>Autonomía</th><th>Pend.</th><th>En proc.</th><th>Hecho</th><th>Confianza</th><th>Estado</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;

  // cola prioritaria
  const qmap={firma:['firma','Firma'],conf:['conf','Confianza baja'],diff:['diff','Diferencia']};
  const cola=colaPrioritaria().map(({t,r})=>{const d=depById(t.dep),q=qmap[r];
    return `<div class="qitem" onclick='openDrawer("${t.id}")'><span class="qdot" style="background:var(${d.tint})"></span>
      <div class="qt"><div class="a">${t.titulo}</div><div class="b">${d.codename} · ${d.nombre} · confianza ${t.confianza}%</div></div>
      <span class="qtag ${q[0]}">${q[1]}</span></div>`;}).join('') || '<div class="note">Sin elementos críticos en cola. Todo bajo control.</div>';
  const colaP=`<div class="panel"><h3>Cola de atención prioritaria <small>· lo que más necesita tu ojo</small></h3><div class="queue">${cola}</div></div>`;

  // evals
  const ev=ags.map(a=>{const d=depById(a.dep),m=metricsDe(a.dep);
    return `<div class="evrow"><span class="av" style="background:${avatarTint(d)}"><svg viewBox="0 0 24 24"><use href="#ic-person"/></svg></span>
      <span class="en">${d.codename}</span>
      <div class="bars"><div class="bar ap"><i style="width:${m.aprob}%"></i></div><div class="bar ed"><i style="width:${m.edit}%"></i></div><div class="bar re"><i style="width:${m.rech}%"></i></div></div>
      <span class="meta">aprob ${m.aprob}% · racha ${m.racha}</span>
      <span class="grad ${m.listo?'':'no'}">${m.listo?'↑ subir autonomía':'en observación'}</span></div>`;}).join('');
  const evals=`<div class="panel"><h3>Calidad y evals <small>· aprobación / edición / rechazo</small></h3>${ev}
    <div class="note">Regla de delegación progresiva: cuando un agente acumula racha ≥ 22 con aprobación ≥ 88% y sin acciones de alto riesgo, queda <b>listo para subir de Sugerir → Co-pilot → Autopilot</b>. Métricas de demostración.</div>
    <div style="margin-top:10px"><span class="verlink" onclick="setVista('evals')">Ver evals completos (harness) →</span></div></div>`;

  // log
  const log=logActividad().map(x=>`<div class="logit"><span class="ic">${x.ic}</span><span class="tx">${x.tx}</span><span class="tm">${x.tm}</span></div>`).join('');
  const logP=`<div class="panel"><h3>Actividad reciente <small>· log y recibos</small></h3><div class="log">${log}</div></div>`;

  return `<div class="centro"><div class="ctitle"><h1>Centro de Operaciones</h1><span class="sub">${e.nombre}${e.sector?' · '+e.sector:''} · supervisión de agentes</span></div>
    ${kpis}${tabla}<div class="cgrid">${colaP}${evals}</div>${logP}</div>`;
}
function evalsHarness(dep){
  const m=metricsDe(dep), sd=_seed(dep+'ev');
  const golden=14+(sd%9), fails=sd%3, pass=golden-fails;
  const exact=Math.round(pass/golden*100), editH=Math.min(18,m.edit+(sd%4));
  const calib=(sd%5===0)?'mid':'ok';
  const trend=(sd%3===0)?'down':'up', trendVal=(trend==='up'?'+':'−')+(1+sd%4)+' pts';
  const listo=(exact>=90 && editH<=12 && !m.highRisk && calib==='ok');
  return {golden,pass,fails,exact,editH,calib,trend,trendVal,listo};
}
function renderEvals(){
  const e=empresa(), ags=agentesEmp();
  const H=ags.map(a=>({d:depById(a.dep),h:evalsHarness(a.dep)}));
  const golden=H.reduce((s,x)=>s+x.h.golden,0), passT=H.reduce((s,x)=>s+x.h.pass,0);
  const exactM=H.length?Math.round(H.reduce((s,x)=>s+x.h.exact,0)/H.length):0;
  const editM=H.length?Math.round(H.reduce((s,x)=>s+x.h.editH,0)/H.length):0;
  const regs=H.reduce((s,x)=>s+x.h.fails,0);
  const card=(n,l,sub,cls)=>`<div class="evc"><div class="n">${n}</div><div class="l">${l}</div>${sub?`<div class="sub ${cls||''}">${sub}</div>`:''}</div>`;
  const cards=`<div class="evcards">${card(passT+'/'+golden,'Casos golden aprobados')}${card(exactM+'%','Exactitud media','▲ vs corrida previa','up')}${card(editM+'%','Tasa de edición humana')}${card(regs,'Regresiones', regs?'requieren atención':'sin regresiones', regs?'down':'up')}</div>`;
  const rows=H.map(({d,h})=>`<tr>
    <td><div class="agc"><span class="av" style="background:${avatarTint(d)}"><svg viewBox="0 0 24 24"><use href="#ic-person"/></svg></span><span class="nm">${d.codename}<small>${d.nombre}</small></span></div></td>
    <td class="num">${h.exact}%</td><td><span class="pass">${h.pass}/${h.golden}</span></td><td class="num">${h.editH}%</td>
    <td><span class="calib ${h.calib}"><span class="d"></span>${h.calib==='ok'?'buena':'revisar'}</span></td>
    <td><span class="sub ${h.trend}" style="font-size:12px">${h.trendVal}</span></td>
    <td><span class="grad ${h.listo?'':'no'}">${h.listo?'↑ subir autonomía':'en observación'}</span></td></tr>`).join('');
  const tabla=`<div class="panel"><h3>Resultados por agente <small>· última corrida del harness</small></h3>
    <table class="evt"><thead><tr><th>Agente</th><th>Exactitud</th><th>Golden</th><th>Edición humana</th><th>Calibración</th><th>Tendencia</th><th>Autonomía</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  const regItems=H.filter(x=>x.h.fails>0).slice(0,3).map(x=>`<div class="regit"><span class="ic">▾</span><div class="tx">${x.d.codename} · ${x.h.fails} caso(s) golden que antes pasaban ahora fallan.<small>Revisa el cambio que introdujo la regresión antes de promover esta versión a producción.</small></div></div>`).join('') || '<div class="note">Sin regresiones frente a la corrida anterior.</div>';
  const reg=`<div class="panel"><h3>Regresiones <small>· lo que empeoró vs. la versión previa</small></h3><div class="reg">${regItems}</div></div>`;
  const note=`<div class="note">Estas métricas salen de un <b>harness con ground-truth</b>: un conjunto "golden" de casos con la respuesta correcta verificada por un humano. Cada corrida mide exactitud, calibración de confianza y regresiones; la <b>autonomía sube</b> solo cuando el agente sostiene exactitud ≥ 90%, edición humana baja, buena calibración y cero regresiones. <b>Demo:</b> los valores son ilustrativos hasta conectar el harness real.</div>`;
  return `<div class="evhead"><span class="backlink" onclick="setVista('centro')">← Centro de Operaciones</span></div>
    <div class="ctitle"><h1>Evaluación de agentes</h1><span class="sub">${e.nombre} · harness con ground-truth · última corrida hoy</span></div>
    ${cards}${tabla}<div class="cgrid">${reg}<div class="panel"><h3>Cómo leerlo</h3>${note}</div></div>`;
}
function trazaHTML(t){
  const tz=t.traza||{pasos:[]};
  const goal=`<div class="goal"><b>Disparador / objetivo</b>${t.resumen||t.titulo}</div>`;
  const steps=(tz.pasos||[]).map((p,i)=>`<div class="step ${p.estado}">
      <div class="rail"><span class="dot">${p.estado==='hold'?'❚❚':(p.estado==='ok'?'✓':(i+1))}</span><span class="line"></span></div>
      <div class="c"><div class="ac">${p.accion}</div>
        <div class="mt"><span class="tool">${p.tool}</span><span>${p.dur}</span><span>${p.estado==='hold'?'escala a humano':'completado'}</span></div>
        ${p.detalle?`<div class="de">↳ ${p.detalle}</div>`:''}</div></div>`).join('');
  const sum=`<div class="trz-sum"><span class="pill">Latencia <b>${tz.latencia||'—'}</b></span><span class="pill">Tokens <b>${tz.tokens||'—'}</b></span><span class="pill">Motor <b>${tz.modelo||'—'}</b></span></div>`;
  return `<div class="trz">${goal}${steps}</div>${sum}`;
}

function autonBadge(a){const m={'Sugerir':'sug','Co-pilot':'cop','Autopilot':'auto'};return `<span class="auton ${m[a]||'cop'}">Autonomía: ${a||'Co-pilot'}</span>`;}
function surfaceHTML(t){
  const c=t.contenido||{}, s=t.surface||'draft';
  if(s==='table'){
    const cols=c.columnas||[], reco=c.recomendado;
    const head=`<tr>${cols.map((h,i)=>`<th class="${i===reco?'reco':''}">${h}</th>`).join('')}</tr>`;
    const rows=(c.filas||[]).map(f=>`<tr>${f.map((v,i)=>`<td class="${i===reco?'reco':''}">${v}</td>`).join('')}</tr>`).join('');
    return `<div class="surf"><div class="surf-h">Comparativo · recomendación del agente</div><table class="cmp">${head}${rows}</table>${c.nota?`<div class="cmp-nota">${c.nota}</div>`:''}</div>`;
  }
  if(s==='findings'){
    const items=(c.items||[]).map(it=>`<div class="it"><span class="sev ${it.sev}"></span><div><div class="tx">${it.texto}</div>${it.fuente?`<div class="fu">Fuente: ${it.fuente}</div>`:''}</div></div>`).join('');
    const src=(c.fuentes&&c.fuentes.length)?`<div class="find-src">Fuentes: ${c.fuentes.map(f=>`<span>${f}</span>`).join('')}</div>`:'';
    return `<div class="surf"><div class="surf-h">Hallazgos del agente</div><div class="find">${items||'<div class="it"><div class="tx">Sin hallazgos.</div></div>'}</div>${src}</div>`;
  }
  if(s==='form'){
    const rows=(c.campos||[]).map(f=>`<div class="row ${f.diff?'diff':''}"><span class="k">${f.label}</span><span class="v">${f.valor}<small>${f.fuente||''}</small></span></div>`).join('');
    return `<div class="surf"><div class="surf-h">Datos extraídos · confirma o corrige</div><div class="frm">${rows}</div>${c.destino?`<div class="frm-dest">Al aprobar: ${c.destino}</div>`:''}</div>`;
  }
  if(s==='steps'){
    const steps=(c.pasos||[]).map((p,i)=>`<div class="s ${p.estado}"><span class="dot">${p.estado==='hecho'?'✓':(i+1)}</span><div><div class="nm">${p.nombre}</div>${p.detalle?`<div class="de">${p.detalle}</div>`:''}</div></div>`).join('');
    return `<div class="surf"><div class="surf-h">Pasos del ciclo · aprueba el paso actual</div><div class="stp">${steps}</div></div>`;
  }
  // draft (por defecto)
  const meta=(c.para||c.asunto)?`<div class="draft-meta">${c.para?`<b>Para:</b> ${c.para}`:''}${(c.para&&c.asunto)?' · ':''}${c.asunto?`<b>Asunto:</b> ${c.asunto}`:''}</div>`:'';
  const chk=(c.checklist&&c.checklist.length)?`<div class="chk">${c.checklist.map(x=>`<div>${x}</div>`).join('')}</div>`:'';
  const cuerpo=(c.cuerpo||t.propuesta||'').replace(/</g,'&lt;');
  return `<div class="surf"><div class="surf-h">${c.doc||'Borrador'} · vista previa editable</div>${meta}<div class="draft-body" id="draftBody">${cuerpo}</div>${chk}</div>`;
}
function editarSurface(){const b=document.getElementById('draftBody');if(b){b.contentEditable=true;b.style.outline='2px solid var(--green)';b.focus();}else{const i=document.getElementById('chatIn');if(i){i.value='Quiero ajustar: ';i.focus();}}}

function openDrawer(id){
  const t=tareasEmp().find(x=>x.id===id);if(!t)return;tareaAbierta=id;
  const d=depById(t.dep),ag=agDe(t.dep)||{},dz=(t.columna==='hecho');

  const meta=`<div class="meta"><span class="pill">Confianza <b>${t.confianza}%</b></span>${(t.canales||[]).map(c=>`<span class="pill">${c}</span>`).join('')}</div>`;
  const firmaGate=(t.firma&&!dz)?`<div class="firma-gate"><b>Acción de alto riesgo.</b> Requiere tu aprobación explícita; el agente no la ejecuta sin tu visto bueno.</div>`:'';
  const apLabel=t.firma?'Firmar y ejecutar':'Aprobar y ejecutar';

  document.getElementById('drawer').innerHTML=`
    <div class="dh"><div class="crow"><span class="deptag" style="background:var(${d.tint})1a;color:var(${d.tint})"><span class="dot" style="background:var(${d.tint})"></span>${d.codename} · ${d.nombre}</span>${autonBadge(t.autonomia)}
      <button class="x" onclick="closeDrawer()">✕</button></div>
      <h2>${t.titulo}</h2><div class="ag"><span class="mini" style="background:${avatarTint(d)}"><svg viewBox="0 0 24 24" style="color:#fff"><use href="#ic-person"/></svg></span> Agente ${ag.nombre||d.nombre}${t.uc?' · '+t.uc:''}${t.fecha?' · '+t.fecha:''}</div></div>
    <div class="dbody">
      <div class="blk"><div class="l"><span class="d" style="background:var(--green)"></span>Por qué requiere tu validación</div><div class="why">${t.razon_escala||ag.escala||'Requiere tu visto bueno antes de ejecutarse.'}</div>${meta}</div>
      <div class="blk">${(t.render&&t.render.blocks)?'<div class="blk-flag"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 3l1.8 4.6L18.4 9l-4.6 1.8L12 15l-1.8-4.2L5.6 9l4.6-1.4L12 3Z"/><path d="M18 14l.8 2.2L21 17l-2.2.8L18 20l-.8-2.2L15 17l2.2-.8L18 14Z"/></svg>Cuerpo generado por la IA · spec de bloques</div>'+renderBlocks(t.render.blocks):surfaceHTML(t)}</div>
      <div class="blk"><div class="l"><span class="d" style="background:var(--administrativo)"></span>Conversación con el agente</div>
        <div class="chat" id="chatThread">${chat||'<div style="font-size:12px;color:var(--gray4)">Aún no hay mensajes.</div>'}</div></div>
      <div class="blk"><button class="seerun" onclick='openTraza("${t.id}")'>Ver la traza de la corrida del agente →</button></div>
    </div>${dec}`;
  document.getElementById('drawer').classList.add('show');document.getElementById('scrim').classList.add('show');
}
function closeDrawer(){document.getElementById('drawer').classList.remove('show');document.getElementById('scrim').classList.remove('show');tareaAbierta=null;}
function enviar(){const i=document.getElementById('chatIn');if(!i||!i.value.trim())return;const t=tareasEmp().find(x=>x.id===tareaAbierta);if(!t)return;
  t.chat=t.chat||[];t.chat.push({de:'yo',texto:i.value.trim()});t.chat.push({de:'agente',texto:'Listo, ajusté el borrador con tu indicación. Revísalo y, si te sirve, apruébalo.'});
  if(t.columna==='pendiente')t.columna='en_proceso';render();openDrawer(t.id);
  setTimeout(()=>{const th=document.getElementById('chatThread');if(th)th.scrollTop=th.scrollHeight;},30);}
function aprobar(){const t=tareasEmp().find(x=>x.id===tareaAbierta);if(!t)return;t.columna='en_proceso';render();openDrawer(t.id);
  setTimeout(()=>{if(t.columna==='en_proceso'){t.columna='hecho';render();if(tareaAbierta===t.id)openDrawer(t.id);}},1400);}
function rechazar(){const t=tareasEmp().find(x=>x.id===tareaAbierta);if(!t)return;const e=empresa();e.tareas=e.tareas.filter(x=>x.id!==t.id);closeDrawer();render();}

function umTab(name){
  ['info','func','funn'].forEach(n=>{
    document.getElementById('umt-'+n).classList.toggle('active', n===name);
    const p=document.getElementById('umPanel-'+n); if(p) p.style.display = n===name?'':'none';
  });
}

/* ---------- modal rol ---------- */
function openRolModal(id){
  const r=id?ROLES.find(x=>x.id===id):null;
  const accion='Guardar';
  const estadoSel=`<option ${!r||r.activo?'selected':''}>Activo</option><option ${r&&!r.activo?'selected':''}>Inactivo</option>`;
  document.getElementById('umodalCard').className='umodal-card';
  document.getElementById('umodalCard').innerHTML=`
    <div class="um-head"><h2>Rol</h2><button class="um-x" onclick="closeUModal()">✕</button></div>
    <div class="um-body">
      <div class="um-tabs"><button class="um-tab active"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6M17 8a3 3 0 0 1 0 6"/></svg>Información</button></div>
      <div class="ufield" style="width:50%;margin-top:22px"><label>Nombre</label><input value="${r?r.rol:''}" placeholder="Pedro Martínez"></div>
      <div class="ufield" style="margin-top:18px"><label>Descripción</label><textarea placeholder="Lorem ipsum descripción">${r?r.descripcion:''}</textarea></div>
      <div class="ufield" style="width:50%;margin-top:18px"><label>Estado</label><select>${estadoSel}</select></div>
      <div class="um-section">Permisos</div>
      <div style="padding:16px 4px">${permTable(PERM_ROL)}</div>
      <div class="um-foot">
        ${r?`<button class="ubtn-lg blue" onclick="openDelete('rol')">Eliminar</button>`:''}
        <button class="ubtn-lg green" onclick="closeUModal()">${accion}</button>
      </div>
    </div>`;
  showUModal();
}

/* ---------- modal filtros ---------- */
function openFiltros(){
  const rolOpts=['Administrador','Agente','Supervisor','Solo lectura'].map(r=>`<option>${r}</option>`).join('');
