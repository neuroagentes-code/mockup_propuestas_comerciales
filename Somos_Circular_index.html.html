/* ---------- confirmar eliminación ---------- */
function openDelete(kind){
  const msg = kind==='user' ? '¿Está seguro que quieres eliminar este usuario?' : '¿Está seguro que quieres eliminar este Rol?';
  document.getElementById('umodalCard').className='umodal-card sm';
  document.getElementById('umodalCard').innerHTML=`
    <div class="um-head"><h2>Eliminar</h2><button class="um-x" onclick="closeUModal()">✕</button></div>
    <div class="um-body" style="padding:24px">
      <div class="udel-msg">${msg}</div>
      <div class="um-foot" style="margin-top:0;justify-content:center">
        <button class="ubtn-lg blue" onclick="closeUModal()">Cancelar</button>
        <button class="ubtn-lg green" onclick="closeUModal()">Eliminar</button>
      </div>
    </div>`;
  showUModal();
}

function showUModal(){document.getElementById('umodal').classList.add('show');}
function closeUModal(){document.getElementById('umodal').classList.remove('show');}
function showUModal2(){document.getElementById('umodal2').classList.add('show');}
function closeUModal2(){document.getElementById('umodal2').classList.remove('show');}

/* =================== MÓDULO DOCUMENTOS =================== */
const DOC_USOS=[
  {id:'reglas',label:'Reglas e Instrucciones',hint:'Ej. Manuales de tono, palabras obligatorias'},
  {id:'datos',label:'Base de Datos para Consultas',hint:'Ej. Catálogos, precios, normativas, inventarios'},
  {id:'plantilla',label:'Plantilla para Redactar',hint:'Ej. Estructura de cotización / factura'},
];
const usoLabel=id=>{const u=DOC_USOS.find(x=>x.id===id);return u?`${u.label} (${u.hint})`:'';};
let DOCUMENTOS=(MODELO.documentos&&MODELO.documentos.length)?MODELO.documentos:[
  {id:'d1',nombre:'Manual de Marca',uso:'reglas',fuente:'archivo',formato:'pdf',url:'',archivo:'manual-de-marca.pdf'},
  {id:'d2',nombre:'Catálogo de Productos 2026',uso:'datos',fuente:'archivo',formato:'doc',url:'',archivo:'catalogo-2026.docx'},
  {id:'d3',nombre:'Plantilla de Cotización',uso:'plantilla',fuente:'archivo',formato:'doc',url:'',archivo:'plantilla-cotizacion.docx'},
  {id:'d4',nombre:'Sitio web corporativo',uso:'datos',fuente:'url',formato:'',url:'https://www.neuroagentes.com',archivo:''},
];
let docPerPage=10;

function docChip(doc){
  if(doc.fuente==='url') return `<span class="dchip url"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 17l6-6M14 7h3a3 3 0 0 1 0 6h-1M10 17H7a3 3 0 0 1 0-6h1"/></svg>URL</span>`;
  const cls=(doc.formato==='doc'||doc.formato==='docx')?'doc':(doc.formato==='txt'?'txt':'pdf');
  const txt=(doc.formato||'pdf').toUpperCase();
  return `<span class="dchip ${cls}"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M6 2h9l5 5v15H6V2Zm9 0v5h5"/></svg>${txt}</span>`;
}

function renderDocumentos(){
  const head=`<div class="u-head">
      <h1>Documentos</h1>
      <div class="u-search"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Buscar"></div>
      <div class="u-acts">
        <button class="ubtn"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg>Exportar</button>
        <button class="ubtn" onclick="openDocFiltros()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 5h18l-7 8v6l-4 2v-8L3 5Z"/></svg>Filtros</button>
        <button class="ubtn" onclick="openDocModal(null)"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Documento</button>
      </div></div>`;
  const entries=`<div class="u-entries" style="justify-content:flex-end">
      <div class="u-perpage">
        <select class="u-sel" onchange="docPerPage=+this.value;render()">${[10,25,50,100].map(n=>`<option ${n===docPerPage?'selected':''}>${n}</option>`).join('')}</select>
        Entradas por página
      </div></div>`;
  const list=DOCUMENTOS.slice(0,docPerPage);
  const rows=list.map(d=>`<div class="u-trow u-grid-doc" style="cursor:pointer" onclick="openDocModal('${d.id}')">
      <div class="u-td">${d.nombre}</div>
      <div class="u-td break">${usoLabel(d.uso)}</div>
      <div>${docChip(d)}</div>
    </div>`).join('');
  const tabla=`<div class="u-tablewrap"><div class="u-scroll">
      <div class="u-thead u-grid-doc"><div class="u-th">Nombre</div><div class="u-th">Tipo</div><div class="u-th">Documento / Link</div></div>
      <div class="u-tbody">${rows}</div>
    </div>${footTabla(DOCUMENTOS.length, docPerPage)}</div>`;
  return head+entries+tabla;
}

/* ---------- modal documento ---------- */
function docRadioUso(el){el.parentElement.querySelectorAll('.dradio').forEach(r=>r.classList.remove('on'));el.classList.add('on');}
function docRadioFuente(el,kind){
  el.parentElement.querySelectorAll('.dradio').forEach(r=>r.classList.remove('on'));el.classList.add('on');
  document.getElementById('docUrlArea').style.display = kind==='url'?'':'none';
  document.getElementById('docFileArea').style.display = kind==='archivo'?'':'none';
}
function docFilePicked(inp){const f=inp.files&&inp.files[0];const box=document.getElementById('docFileName');if(f){box.style.display='flex';box.querySelector('.nm').textContent=f.name;}else{box.style.display='none';}}
function docFileRemove(){const i=document.getElementById('docFileInput');if(i)i.value='';document.getElementById('docFileName').style.display='none';}

function openDocModal(id){
  const d=id?DOCUMENTOS.find(x=>x.id===id):null;
  const uso=d?d.uso:'datos';
  const fuente=d?d.fuente:'archivo';
  const usos=DOC_USOS.map(u=>`<div class="dradio ${uso===u.id?'on':''}" onclick="docRadioUso(this)">
      <span class="rc"><svg viewBox="0 0 24 24" fill="none" stroke-width="3"><path d="m5 12 5 5 9-10"/></svg></span>
      <span class="lb"><b>${u.label}</b> (${u.hint})</span></div>`).join('');
  const fileArea=`<div id="docFileArea" style="display:${fuente==='archivo'?'':'none'}">
      <input type="file" id="docFileInput" accept=".pdf,.doc,.docx,.txt" style="display:none" onchange="docFilePicked(this)">
      <button class="dupload" type="button" onclick="document.getElementById('docFileInput').click()"><span class="plus">+</span> Documento</button>
      <div id="docFileName" class="dfile" style="display:${d&&d.fuente==='archivo'&&d.archivo?'flex':'none'}">
        <span class="nm">${d&&d.archivo?d.archivo:''}</span><button class="rm" type="button" onclick="docFileRemove()">Eliminar</button></div>
    </div>`;
  const urlArea=`<div id="docUrlArea" style="display:${fuente==='url'?'':'none'}">
      <div class="ufield" style="max-width:460px"><label>URL</label><input value="${d&&d.url?d.url:''}" placeholder="https://www.neuroagentes.com"></div>
    </div>`;
  document.getElementById('umodalCard').className='umodal-card';
  document.getElementById('umodalCard').innerHTML=`
    <div class="um-head"><h2>Documento</h2><button class="um-x" onclick="closeUModal()">✕</button></div>
    <div class="um-body">
      <div class="ufield" style="max-width:460px"><label>Nombre</label><input value="${d?d.nombre:''}" placeholder="Manual de marca"></div>
      <div class="d-section">¿Para qué usará la IA este archivo?</div>
      <div class="dradios">${usos}</div>
      <div class="d-section">Link / Documento (PDF, Word, TXT)</div>
      <div class="dradios">
        <div class="dradio ${fuente==='archivo'?'on':''}" onclick="docRadioFuente(this,'archivo')"><span class="rc"><svg viewBox="0 0 24 24" fill="none" stroke-width="3"><path d="m5 12 5 5 9-10"/></svg></span><span class="lb">Subir un archivo (.pdf, .docx)</span></div>
        <div class="dradio ${fuente==='url'?'on':''}" onclick="docRadioFuente(this,'url')"><span class="rc"><svg viewBox="0 0 24 24" fill="none" stroke-width="3"><path d="m5 12 5 5 9-10"/></svg></span><span class="lb">Subir una URL</span></div>
      </div>
      <div style="margin-top:14px">${fileArea}${urlArea}</div>
      <div class="um-foot">
        ${d?`<button class="ubtn-lg blue" onclick="openDocDelete()">Eliminar</button>`:''}
        <button class="ubtn-lg green" onclick="closeUModal()">Guardar</button>
      </div>
    </div>`;
  showUModal();
}

  const tipoOpts=DOC_USOS.map(u=>`<option>${u.label}</option>`).join('');
  document.getElementById('umodalCard').className='umodal-card sm';
  document.getElementById('umodalCard').innerHTML=`

}

function tabIcon(ic){
  const m={
    doc:'<path d="M5 4h9l5 5v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Zm9 0v5h5"/>',
    crm:'<rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="11" rx="1"/><rect x="17" y="4" width="4" height="14" rx="1"/>',
    link:'<path d="M9 17l6-6M14 7h3a3 3 0 0 1 0 6h-1M10 17H7a3 3 0 0 1 0-6h1"/>',
    user:'<circle cx="9" cy="8" r="3"/><path d="M3 19c0-3 2.7-5 6-5s6 2 6 5M16 6l2 2 4-4"/>',
    gear:'<circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/>',
  };
  return `<svg viewBox="0 0 24 24" fill="none" stroke-width="2">${m[ic]||m.doc}</svg>`;
}
function setAgtTab(t){agtTab=t;render();}
function vecToggleActivo(el){vecActivo=!vecActivo;el.classList.toggle('on',vecActivo);el.parentElement.querySelector('.tg-label').textContent=vecActivo?'Activo':'Inactivo';}
function vgroupToggle(el){el.closest('.vgroup').classList.toggle('closed');}
function vchatPick(el){el.parentElement.querySelectorAll('.vitem').forEach(x=>x.classList.remove('on'));el.classList.add('on');}
function vecSend(){
  const i=document.getElementById('vecInput'); if(!i||!i.value.trim())return;
  VEC_CHAT.push({de:'me',texto:i.value.trim()});
  VEC_CHAT.push({de:'ag',texto:'Recibido. Lo preparo y te confirmo en breve.'});
  document.getElementById('agtVector').innerHTML=renderAgentVector();
  const t=document.querySelector('.vthread'); if(t)t.scrollTop=t.scrollHeight;
}
function renderAgentVector(){
  const d=depById(depFiltro), e=empresa(), sd=_seed(d.id);
  const tokens=(60+sd%180), costo=(1+(sd%500)/100).toFixed(2).replace('.',',');
  const img=DEP_IMG[d.id];
  const figura = img ? `<img src="${img}" alt="${d.codename}">` : `<svg viewBox="0 0 24 24"><use href="#ic-person"/></svg>`;
  const _cats=_agentCatalogos(d.id);
  const catRows=_cats.length
    ? _cats.map(({c,perm})=>`<div class="vcat-row" onclick="irACatalogo('${c.id}')"><span class="vcat-nm">${c.nombre}</span><span class="vcat-perm ${perm==='escribe'?'w':''}">${_permLabel(perm)}</span></div>`).join('')
    : '<div class="vcat-empty">Sin catálogos asignados.</div>';
  const carat=`<div class="vcard">
      <div class="gear"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/></svg></div>
      <div class="tog"><span class="vtoggle ${vecActivo?'on':''}" onclick="vecToggleActivo(this)"><i></i></span><span class="tg-label">${vecActivo?'Activo':'Inactivo'}</span></div>
      <div class="vcard-row">
        <div class="photo">${figura}</div>
        <div class="vcard-id"><div class="vname">${d.codename}</div><div class="vrole">Agente ${d.nombre}</div>
          <div class="stats">
            <div class="vstat"><div class="l">Tokens</div><div class="n">${tokens}k / 2M</div></div>
            <div class="vstat r"><div class="l">Costo Hoy</div><div class="n">USD ${costo}</div></div>
          </div></div>
      </div>
      <div class="vcard-cats">
        <div class="vcc-head" onclick="this.parentElement.classList.toggle('open')"><span>Catálogos que usa <span class="vcc-n">${_cats.length}</span></span><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div>
        <div class="vcc-body">${catRows}<div class="vcc-foot">Toca un catálogo para abrirlo en Datos.</div></div>
      </div></div>`;
  const tools=`<div class="vbox vbox-tools"><div class="vtools">
      <div class="vs"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Buscar Chats"></div>
      <button class="vnew">Nuevo</button></div></div>`;
  const grupos=VEC_GRUPOS.map(g=>`<div class="vgroup">
      <div class="vgh" onclick="vgroupToggle(this)">${g.nombre}<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div>
      <div class="vitems">${g.items.map(it=>`<div class="vitem" onclick="vchatPick(this)">${it}</div>`).join('')}</div></div>`).join('');
  const izq=`<div class="vec-left">${carat}${tools}<div class="vlist">${grupos}</div></div>`;

function _hoyStr(){const d=new Date(),p=n=>String(n).padStart(2,'0');return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear();}
function _nuevaFacturaNum(){let mx=0;FACTURAS.forEach(f=>{const m=/(\d+)$/.exec(f.num||'');if(m)mx=Math.max(mx,+m[1]);});return 'NA-'+new Date().getFullYear()+'-'+String(mx+1).padStart(4,'0');}

function confirmarPago(){
  const g=id=>((document.getElementById(id)||{}).value||'');
  const num=g('payNum').replace(/\s/g,''), exp=g('payExp'), cvc=g('payCvc');
  const rec=(document.getElementById('payRec')||{}).checked;
  const err=document.getElementById('payErr');
  const fail=m=>{if(err){err.textContent=m;err.style.display='block';}};
  if(num.length<13) return fail('Ingresa un número de tarjeta válido.');
  if(!/^\d{2}\/\d{2}$/.test(exp)) return fail('Ingresa el vencimiento como MM/AA.');
  if(cvc.length<3) return fail('Ingresa el código CVC.');
  if(!rec) return fail('Debes autorizar el cobro recurrente para activar la suscripción.');
  const brand=num[0]==='4'?'Visa':num[0]==='5'?'Mastercard':num[0]==='3'?'Amex':'Tarjeta';
  METODO_PAGO=brand+' ···· '+num.slice(-4); RECURRENTE=true;
  const p=PLANES.find(x=>x.nombre===PAY_PLAN)||PLANES[0]; PLAN_ACTUAL=p.nombre; PLAN_PROGRAMADO=''; SUB_CANCELADA=false;
  const mes=new Date().toLocaleDateString('es-CO',{month:'long',year:'numeric'}).replace(' de ',' ');
  FACTURAS.unshift({num:_nuevaFacturaNum(),fecha:_hoyStr(),concepto:'Suscripción '+p.nombre+' — '+mes.charAt(0).toUpperCase()+mes.slice(1),monto:p.precio_usd,estado:'Pagado'});
  closeUModal();
  SUS_MSG='Plan mejorado a '+p.nombre+'. El cambio aplica de inmediato con cobro recurrente mensual.';
  susTab='facturacion'; render();
}

/* Intérprete demo: traduce lenguaje natural a una mutación del spec (en prod lo hace el LLM). */
function aplicarAjuste(blocks,texto){
  const t=texto.toLowerCase();
  const chart=blocks.find(b=>b.type==='chart');
  if(chart && /l[ií]nea|lines?/.test(t)){chart.chart='line';return 'Vector regeneró el artefacto: el gráfico ahora es de líneas.';}
  if(chart && /barra|bars?/.test(t)){chart.chart='bar';return 'Vector regeneró el artefacto: el gráfico ahora es de barras.';}
  const li=blocks.find(b=>b.type==='lineitems');
  if(li && /descuento|rebaja|off/.test(t)){
    li.items=li.items.filter(it=>!/descuento/i.test(it[0]));
    const base=li.items.reduce((s,it)=>s+it[1],0);
    if(/quita|sin|elimina|0%/.test(t)){li.total=base;return 'Vector regeneró el artefacto: quitó el descuento.';}
    const m=t.match(/(\d+(?:[.,]\d+)?)\s*%/);const pct=m?parseFloat(m[1].replace(',','.')):10;
    const desc=Math.round(base*pct/100);li.items.push([`Descuento ${pct}%`,-desc]);li.total=base-desc;
    return `Vector regeneró el artefacto: aplicó un descuento del ${pct}% (total ${fmtVal(li.total)}).`;
  }
  const msg=blocks.find(b=>b.type==='message');
  if(msg && /(corto|breve|resume)/.test(t)){msg.body=msg.body.split('. ')[0].replace(/\.*$/,'')+'.';return 'Vector regeneró el artefacto: acortó el correo.';}
  if(msg && /formal/.test(t)){msg.body='Estimado/a, '+msg.body.charAt(0).toLowerCase()+msg.body.slice(1);return 'Vector regeneró el artefacto: dio un tono más formal al correo.';}
  const kpi=blocks.find(b=>b.type==='kpi');
  if(kpi && /(kpi|m[ée]trica|indicador)/.test(t)){kpi.items.push({label:'Ajuste solicitado',value:'✓'});return 'Vector regeneró el artefacto: agregó un indicador.';}
  blocks.push({type:'note',text:'Nota del supervisor: '+texto});
  return `Vector añadió una nota al artefacto: "${texto}".`;
}
/* ---- cuerpo generativo: renderiza bloques desde un spec (lo que emitiría la IA) ---- */
function blkKpi(b){return `<div class="blk-kpi">${b.items.map(k=>`<div class="kpi"><div class="kl">${k.label}</div><div class="kv">${k.value}</div>${k.delta?`<div class="kd ${k.delta[0]==='-'?'down':'up'}">${k.delta}</div>`:''}</div>`).join('')}</div>`;}
function blkTable(b){return `<div class="blk-card">${b.title?`<div class="blk-h">${b.title}</div>`:''}<table class="blk-table"><thead><tr>${b.columns.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${b.rows.map(r=>`<tr>${r.map((c,i)=>`<td${i===0?' class="k"':''}>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;}
function blkLineitems(b){return `<div class="blk-card"><div class="blk-h">${b.title||'Detalle'}</div>${b.items.map(([d,v])=>`<div class="art-li"><span>${d}</span><span>${fmtVal(v)}</span></div>`).join('')}<div class="art-total"><span>Total</span><span>${fmtVal(b.total)}</span></div></div>`;}
function blkMessage(b){const wa=b.canal==='whatsapp';return `<div class="blk-card blk-msg"><span class="badge ${wa?'wa':'email'}">${wa?'WhatsApp':'Correo'} · borrador</span>${b.to?`<div class="to">Para: ${b.to}</div>`:''}${b.subject?`<div class="subj">${b.subject}</div>`:''}<div class="body">${b.body}</div></div>`;}
function blkDocument(b){return `<div class="blk-card">${b.title?`<div class="blk-h">${b.title}</div>`:''}<div style="font-size:13px;color:var(--ink);line-height:1.55">${b.body}</div></div>`;}
function blkChart(b){
  const W=460,H=200,padL=18,padB=26,padT=10,padR=12,plotH=H-padT-padB,y0=H-padB,x0=padL,plotW=W-padL-padR;
  const xs=b.x||[],series=b.series||[],all=series.flatMap(s=>s.data),max=Math.max(1,...all);
  const colors=['var(--green)','var(--blue)','#e8a13a'],n=Math.max(1,xs.length),step=plotW/n;
  let body=`<line x1="${x0}" y1="${y0}" x2="${W-padR}" y2="${y0}" stroke="var(--border)" stroke-width="1"/>`;
  if((b.chart||'bar')==='line'){
    series.forEach((s,si)=>{const pts=s.data.map((v,i)=>`${(x0+step*i+step/2).toFixed(1)},${(y0-(v/max)*plotH).toFixed(1)}`).join(' ');
      body+=`<polyline points="${pts}" fill="none" stroke="${colors[si%3]}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`+s.data.map((v,i)=>`<circle cx="${(x0+step*i+step/2).toFixed(1)}" cy="${(y0-(v/max)*plotH).toFixed(1)}" r="3" fill="${colors[si%3]}"/>`).join('');});
  } else {
    const g=Math.max(1,series.length),bw=Math.min(30,(step*0.66)/g);
    series.forEach((s,si)=>{body+=s.data.map((v,i)=>{const h=(v/max)*plotH,bx=x0+step*i+step/2-(g*bw)/2+si*bw;return `<rect x="${bx.toFixed(1)}" y="${(y0-h).toFixed(1)}" width="${(bw-3).toFixed(1)}" height="${Math.max(0,h).toFixed(1)}" rx="3" fill="${colors[si%3]}"/>`;}).join('');});
  }
  body+=xs.map((l,i)=>`<text x="${(x0+step*i+step/2).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="11" fill="var(--soft)">${l}</text>`).join('');
  const leg=series.length>1?`<div class="blk-legend">${series.map((s,si)=>`<span><i style="background:${colors[si%3]}"></i>${s.name}</span>`).join('')}</div>`:'';
  return `<div class="blk-card">${b.title?`<div class="blk-h">${b.title}</div>`:''}<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${body}</svg>${leg}</div>`;
}
function renderBlocks(blocks){return (blocks||[]).map(b=>{switch(b.type){
  case 'kpi':return blkKpi(b); case 'chart':return blkChart(b); case 'table':return blkTable(b);
  case 'lineitems':return blkLineitems(b); case 'message':return blkMessage(b); case 'document':return blkDocument(b);
  case 'note':return `<div class="blk-card" style="color:var(--soft);font-size:12.5px">${b.text}</div>`; default:return '';}}).join('');}

      ${_pfS('Tono de comunicación',PERFIL.tono,['Cercano y cálido','Profesional','Técnico','Formal'],'pfTono')}
      ${_pf('Horario de atención',PERFIL.horario,'pfHorario')}
    </div></div>`;
  const redes=`<div style="background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;margin-top:18px">
      <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px">Redes sociales</div>
      <div style="font-size:12.5px;color:var(--soft);margin-bottom:16px">Agrega las redes y enlaces de tu empresa. Puedes añadir <b>varias</b>.</div>
      <div id="pfRedesEdit">${_redesRowsHTML()}</div>
      <button class="pf-addred" type="button" onclick="addRed()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Agregar red</button>
    </div>`;
  const docs=`<div style="background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;margin-top:18px">
      <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px">Documentos de registro</div>
      <div style="font-size:12.5px;color:var(--soft);margin-bottom:16px">Archivos que cargaste al registrar tu empresa (cámara de comercio, RUT, logo…).</div>
      <div id="pfDocsEdit">${_docsRowsHTML()}</div>
      <input type="file" id="pfDocInput" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" style="display:none" onchange="addDocPick(this)">
      <button class="pf-addred" type="button" onclick="document.getElementById('pfDocInput').click()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Agregar documento</button>
    </div>`;
  const acc=`<div style="margin-top:16px"><button class="ubtn" style="background:transparent;border:1px solid var(--border);color:var(--ink)" onclick="openPassModal()">Cambiar contraseña</button></div>`;
  const note=`<div class="note" style="margin-top:16px">Los <b>datos de facturación</b> (con los que sale la factura) se gestionan en <b>Suscripción → Datos de facturación</b>.</div>`;
  return head+cuenta+empresa+ctx+redes+docs+acc+note;
}
function setPerfilEdit(v){ perfilEdit=!!v; render(); }

/* ---- toast global reutilizable ---- */
function toast(msg){
  let t=document.getElementById('naToast');
  if(!t){ t=document.createElement('div'); t.id='naToast'; t.style.cssText='position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--green-ink);color:#fff;padding:13px 20px;border-radius:12px;font-family:var(--font);font-weight:600;font-size:13.5px;box-shadow:0 12px 30px -10px rgba(0,0,0,.45);z-index:120;display:flex;align-items:center;gap:9px;opacity:0;transition:opacity .2s'; document.body.appendChild(t); }
  t.innerHTML='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#00FF7A" stroke-width="2.5"><path d="m5 12 5 5 9-10"/></svg>'+msg;
  t.style.opacity='1'; clearTimeout(t._h); t._h=setTimeout(()=>{t.style.opacity='0';},2600);
}

/* ---- modal Cambiar contraseña ---- */
function _eyeOpen(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>'; }
function _eyeOff(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l18 18M10.6 10.6a3 3 0 0 0 4.2 4.2M9.9 5.1A9.8 9.8 0 0 1 12 5c6.5 0 10 7 10 7a17.4 17.4 0 0 1-3.2 4M6.1 6.1A17 17 0 0 0 2 12s3.5 7 10 7a9.7 9.7 0 0 0 3-.5"/></svg>'; }
function togglePw(id,btn){ const inp=document.getElementById(id); if(!inp)return; const show=inp.type==='password'; inp.type=show?'text':'password'; btn.innerHTML=show?_eyeOff():_eyeOpen(); }
function openPassModal(){
  const card=document.getElementById('umodalCard'); card.className='umodal-card sm'; card.style.width='';
  const field=(label,id)=>`<div class="ufield pw-field" style="margin-bottom:16px"><label>${label}</label><input id="${id}" type="password" placeholder="••••••••" oninput="validatePw()"><button class="pw-eye" type="button" onclick="togglePw('${id}',this)">${_eyeOpen()}</button></div>`;
  const reqRow=(id,t)=>`<div class="pw-req" id="req-${id}"><span class="rc"><svg viewBox="0 0 24 24"><path d="m5 12 5 5 9-10"/></svg></span>${t}</div>`;
  card.innerHTML=`
    <div class="um-head"><h2>Cambiar contraseña</h2><button class="um-x" onclick="closeUModal()">✕</button></div>
    <div class="um-body">
      ${field('Contraseña actual','pwOld')}
      ${field('Nueva contraseña','pwNew')}
      ${field('Confirmar nueva contraseña','pwConf')}
      <div class="pw-reqs">${reqRow('len','Mínimo 8 caracteres')}${reqRow('mix','Al menos una letra y un número')}${reqRow('match','Las contraseñas coinciden')}</div>
      <div class="pw-err" id="pwErr"></div>
      <div class="um-foot">
        <button class="ubtn-lg" style="background:transparent;border:1px solid var(--border);color:var(--ink)" onclick="closeUModal()">Cancelar</button>
        <button class="ubtn-lg green" id="pwSave" onclick="guardarPass()" disabled style="opacity:.5;cursor:not-allowed">Cambiar</button>
      </div>
    </div>`;
  showUModal(); validatePw();
}
function validatePw(){
  const g=id=>((document.getElementById(id)||{}).value||'');
  const nv=g('pwNew'), cf=g('pwConf');
  const okLen=nv.length>=8, okMix=/[a-zA-Z]/.test(nv)&&/\d/.test(nv), okMatch=nv.length>0&&nv===cf;
  const set=(id,ok)=>{const el=document.getElementById('req-'+id); if(el)el.classList.toggle('ok',ok);};
  set('len',okLen); set('mix',okMix); set('match',okMatch);
  const all=okLen&&okMix&&okMatch, btn=document.getElementById('pwSave');
  if(btn){ btn.disabled=!all; btn.style.opacity=all?'1':'.5'; btn.style.cursor=all?'pointer':'not-allowed'; }
  const err=document.getElementById('pwErr'); if(err&&all)err.style.display='none';
  return all;
}
function guardarPass(){
  const g=id=>((document.getElementById(id)||{}).value||'');
  const err=document.getElementById('pwErr'); const fail=m=>{if(err){err.textContent=m;err.style.display='block';}};
  if(!g('pwOld')) return fail('Ingresa tu contraseña actual.');
  if(!validatePw()) return fail('Revisa los requisitos de la nueva contraseña.');
  if(g('pwOld')===g('pwNew')) return fail('La nueva contraseña debe ser distinta de la actual.');
  closeUModal(); toast('Contraseña actualizada correctamente.');
}
function guardarPerfil(){ const g=id=>(document.getElementById(id)||{}).value||''; PERFIL.contacto=g('pfContacto');PERFIL.rol=g('pfRol');PERFIL.correo=g('pfCorreo');PERFIL.telefono=g('pfTel');PERFIL.empresa=g('pfEmpresa');PERFIL.pais=g('pfPais');PERFIL.departamento=g('pfDepto');PERFIL.ciudad=g('pfCiudad');
  PERFIL.web=g('pfWeb');PERFIL.sector=g('pfSector');PERFIL.descripcion=g('pfDesc');PERFIL.productos=g('pfProd');PERFIL.propuestaValor=g('pfValor');PERFIL.clienteObjetivo=g('pfCliente');PERFIL.tono=g('pfTono');PERFIL.horario=g('pfHorario');_captureRedes(); perfilEdit=false; render(); }

/* ---- Datos de facturación (tab de Suscripción) ---- */
function susDatos(){ return factEdit ? susDatosEdit() : susDatosView(); }
function susDatosView(){
  const grid=`<div style="background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px">
    <div class="pfv-grid">
      ${_pfV('Razón social / Nombre',FACT_DATOS.razon)}
      ${_pfV('NIT / RUT',FACT_DATOS.nit)}
      ${_pfV('Dirección',FACT_DATOS.dir,true)}
      ${_pfV('Ciudad',FACT_DATOS.ciudad)}
      ${_pfV('País',FACT_DATOS.pais)}
      ${_pfV('Correo de facturación',FACT_DATOS.correo,true)}
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:20px"><button class="ubtn" onclick="setFactEdit(true)">${_pencil()}Editar datos</button></div>
  </div>`;
  const foot=`<div class="note" style="margin-top:16px">Estos son los datos con los que se emite <b>cada factura</b> (los ves en el tab Facturación). Edítalos aquí y las próximas facturas saldrán actualizadas.</div>`;
  return grid+foot;
}
function susDatosEdit(){
  const grid=`<div style="background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:16px">
    ${_pf('Razón social / Nombre',FACT_DATOS.razon,'susRazon')}
    ${_pf('NIT / RUT',FACT_DATOS.nit,'susNit')}
    ${_pf('Dirección',FACT_DATOS.dir,'susDir',true)}
    ${_pf('Ciudad',FACT_DATOS.ciudad,'susCiudadF')}
    ${_pf('País',FACT_DATOS.pais,'susPaisF')}
    ${_pf('Correo de facturación',FACT_DATOS.correo,'susCorreoF',true)}
    <div style="grid-column:1/-1;display:flex;justify-content:flex-end;gap:12px"><button class="ubtn" style="background:transparent;border:1px solid var(--border);color:var(--ink)" onclick="setFactEdit(false)">Cancelar</button><button class="ubtn" onclick="guardarFacturacion()">Guardar datos</button></div>
  </div>`;
  const foot=`<div class="note" style="margin-top:16px">Estos son los datos con los que se emite <b>cada factura</b> (los ves en el tab Facturación). Edítalos aquí y las próximas facturas saldrán actualizadas.</div>`;
  return grid+foot;
}
function setFactEdit(v){ factEdit=!!v; SUS_MSG=''; render(); }
function guardarFacturacion(){ const g=id=>(document.getElementById(id)||{}).value||''; FACT_DATOS.razon=g('susRazon');FACT_DATOS.nit=g('susNit');FACT_DATOS.dir=g('susDir');FACT_DATOS.ciudad=g('susCiudadF');FACT_DATOS.pais=g('susPaisF');FACT_DATOS.correo=g('susCorreoF'); factEdit=false; SUS_MSG='Datos de facturación actualizados. Las próximas facturas saldrán con estos datos.'; render(); }

empresaId=estado.empresas[0].id;depFiltro=firstDep();render();renderAuth();
</script>
